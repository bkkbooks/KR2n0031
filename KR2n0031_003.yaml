body:
  text: 法帖釋文考異卷三明顧從義撰晉太尉庾元亮書伯思云庾亮書云奉告書箱先為媞子作案江淮之間謂母曰媞此云媞子未知目何戚也爾雅云媞媞安也案史庾亮字元規大觀標目庾亮置三卷第四亮白奉告書葙案急就章箱亦作草頭先為媞音氏又音啼弟子作輙先以奉之研今作之支髮枕今作劉作作施作注無作劉作作施作治模若有可權付之亮再拜案大觀帖自開禧以後磨去亮字右邊轉筆蓋避逆亮諱也晉車騎將軍庾翼書伯思云庾翼帖稱故吏從事中郎按翼嘗為陶侃太尉府從事中郎此當是與侃啟也大觀置三卷第五故吏從事中郎庾翼叅軍事劉遐字正長死罪白昨所啟龎遺孟莫大羽日榻飛也所請求述上事事須撿挍一作㧞非諮論光駕當出請不從詣録事中郎共詳處别白謹啟翼遐死罪死罪已向季春感慕兼傷情不自任奈何奈何温和足下何如吾哀勞何賴愛䕶時不足下須一作頃氣力熟若别時米云同章帝一手偽帖晉太守沈嘉長書按史沈嘉字長茂大觀置三卷第六十二月十三日嘉頓首頓首歲有感懷深寒切想各平安㒒勞弊遣不具施作乙乙沈嘉頓首頓首晉侍中杜預書伯思云杜預有十一月十四日帖云道逺書問又簡間得來況非當時尺牘中語或是江左人書不特親故帖偽也親故末云數附書信以慰吾心亦近世流俗語耳大觀置三卷第二十一月十四日預頓首嵗忽已終别久益兼其勞道逺書問又蕑間得來況一作説知消息申省次若言面米云此帖眞親故數移轉想祖父白具云也祖父如足下來言小大云具孤劉施作絶女劉作汝一作如親親也有信數附書信以慰吾心也米云同章帝偽帖晉王循書大觀標目作晉中軍將軍王循置三卷第七七月廿四日循遮施闕一作舊非頓首秋月感思深得近示為慰餘熱比復可不㒒疾患故爾不平復頓勿力書不盡王循遮頓首褚遂良羲之書目有阿遮帖張彦逺帖語中有報敬倫遮恐是王氏子姓米云同上偽晉劉超書伯思云晉劉超為人慎密自以書類元帝不敢與外書此帖不應尚傳又字勢與元帝大别其偽審矣大觀標目作晉衛尉劉超書置三卷第九超死罪白如命皆令有本末保任然後受随宜分處謹白晉散騎常侍謝璠伯書大觀置三卷第十此計江東精兵不可卒得唯當善養見者而事慮日多如比來憂懷實已萬端晉黃門郎王徽之書大觀作晉黃門侍郎置三卷第十一得信潘本右有錠紋承㛐疾不减憂灼寧復何言陳云劉作耳誤吾便欲往恐不見汝等湖水泛漲不可渡遂復隔孫本闕耳旁絶不然尋已往彼故遣疏知吾逺懷不具徽之等告晉謝莊書伯思云謝莊首終仕宋而題曰晉大誤大觀標目作宋光禄大夫謝莊置三卷第二十六弟昨還方承一日一合二字作間忽患一作戀悶當時乃爾大惡殊不易追企怛一作垣想諸治昨施云疑來已漸勝眠食復云何頃一作須日寒重春節至居患者無不憎施作增動今作何治眼風不異耳指遣承問謝莊白呈左㒒射晉侍中司馬攸書攸封齊王幾為太子者數矣合置司馬道子之上大觀標目作晉齊獻王侍中司馬攸書置三卷第一攸惶恐頓首頓首望近未得諮承以為華本以為右有三卷二字委華本委字下有補㾗積比已秋風不審尊體何如冀行得禀受首頓首晉劉瓌書伯思云劉瓌之迺東晉時善八分者大令既不肯書太極殿榜謝安石遂令瓌之以八分題之今此帖非眞與王廙廿四日廙帖無異按瓌之字元寶仕至御史中丞脱一之字大觀標目有之字置三卷第十五瓌之頓首帖空一字末陽逺感閏知有患耿耿知以自屈恨不相見力及不比望懷之大觀帖多頓首頓首四字米云同章帝偽帖晉王坦之書伯思云王著叙坦之書列於逸少諸子間意以名皆從之殊不知坦之迺述子自太原王耳非琅琊王也非通古甚那至爾案坦之仕至安北將軍與上徽之易至始得大觀標目作晉中書令王坦之置三卷第十六坦之惶恐言不知己興施作與謝郎論坦之事未其意良一斷作不了者今當此字疑詣公自陳願告坦之惶恐言晉王渙之書伯思云王氏凝操徽渙之四子書皆眞帖逸少七子上四人與子敬書具傳惟𤣥之肅之遺蹟未見皆得家範而體各不同是善學逸少書者猶顔延年對宋文帝論其諸子自謂竣得臣筆測得臣文㚟得臣義躍得臣酒書亦猶是也㒒今以擬王氏諸子則逸少之書凝之得其韻操之得其體徽之得其勢渙之得其貌獻之得其源然而大令之書特知名而與逸少方駕者蓋能本父之書意所循者大故也眞行則法鍾草聖則師張二家之法逸少所自出從而效之所以特髙於諸王猶魯堂諸子由賜商偃皆以儒稱卒之得其傳者子淵而已大觀置三卷第十四渙之等白不審二㛐常患復何如馳情倫直等平安計㛐倫奴已應在道企遲適東五日動静最差速華本右有三卷二字姑如華本右有六字復小勝冀遂和耳猶不寧餘上下施合二字作叔故常患反側此悉佳渙之等白晉王操之書仕至侍中尚書大觀作晉侍中王操之置三卷第十二操之等白得識婢書慰意知年光數問可不不得姜順消息懸心操之頓首施作等白二字晉王凝之書仕至左將軍會稽内史大觀作晉左將軍王凝之置三卷第十三八月廿九日告庾氏女明便授衣感逝悲歎念增逺思得郄中書書説汝勉難安隱深慰懸心漸施作微冷産後何似宜佳消息吾並更不佳憂之遣不次凝之等書晉征西司馬索靖書伯思云索靖有七月廿六日帖本七紙晉王平南廙每寶玩之値永嘉亂乃四疊綴衣中以度江唐蒲州桑泉令君盧器得之疊蹟猶存今所録惟一紙耳摹傳失眞無復意象大觀置三卷第十七載妖㜸過臧災甾莫告咎臯陶惟施釋闕士繩罪報鞠按城劉釋闕㨿號裁割辜戮羞屈愬謾逆曲歸想輟寂鬪爭念復鞉鼓肆陳愛曰施釋闕於予劉釋闕一作爭琴瑟以詠歌其命禽爵翔榮一作集一作巢獸乃鼔劉釋作歌舞聲翳麗城越動飛走脉土處一作䖍農姬業疑作棄掌稷七月廿六日具書靖白雖數相聞不解勞倦信至施作具非得書悉知弃云宅及計來東言展有期索靖白晉侍中劉穆之書大觀晉作宋置三卷第二十七所欲劉釋疑施作亦知是足下家弊耳倉卒無禄故施疑當作官字推遷不得不相用事已御出寧復吾所得廻復足下且當就之公還當思更律華本更律二字糢糊右有十一二字潘本二字亦糢糊獨顧本不損啟申師情事也劉穆之白米云同章帝偽帖晉尚書王劭書大觀標目作晉尚書令王劭置三卷第十八劭白明便夏節哀慕崩摧肝心抽絶煩寃彌深不自忍任痛當奈何當復奈何得告為慰腫轉差勞悴勿勿力及不次王劭再拜米云同章帝偽帖晉車騎將軍紀贍書伯思云紀贍帖中有云貧家無以將意所謂物微意全也觀此語不待見筆蹟可判其偽矣大觀釋注云石刻標題誤以瞻為贍史作瞻大觀標目作晉侍中紀瞻置三卷第二十一瞻白昨信來闕此上二字劉與施釋俱闕一作永携可疑今蓋一作送案書法當作逞又貧家無以將意今粉二斗少香所謂施釋注中陳與義云劉誤當作須物微意全者也力書不多紀瞻頓首晉司徒王廞書大觀置三卷第二十告誘靜媛靜儀靜婔此晦便當假葬永痛抽剥心情𤓰劉施俱作分字割不自勝念汝等追痛摧慟纒綿斷絶何可堪任痛當案潘本華本割不字纒綿斷絶字當字俱糢糊惟顧本俱全奈何當復奈何遣施施作悲又疑未是或作憵玊篇晉狄切急速也涕不次廞疏大觀帖有八月廿八日五字晉太守張翼書大觀置三卷第二十二廿三日劉施闕當作賴劉作卿施闕一作即當作郎翼頓首節過多懷得近書為慰意以何如深勞弊頓曳力還不具施作乙乙晉陸雲書位至都督大觀標目作晉都督陸雲置三卷第二十二三月十六日雲白春節餘不適得示知足下平安為思面未知何由如何信數之及卿既清邃可之一作云一作與經髙施作髙孫本摹作亭言人歎之當令征南取之也米云已上三帖同章帝偽帖晉海陵恭侯王邃書大觀置三卷第二十四寒佳不張丞婚事云何是良對足下可時令知女决也王邃白晉中書令王恬書大觀置三卷第十九得示知足下問吾故不差殊劣劣力小一作少具施作乙乙一作令王恬白晉太守山濤書伯思云山濤啟事與李懷琳所撰七賢書中濤書自相矛盾但此啟文是而書非七賢帖中筆語皆妄也大觀置三卷第三侍中尚書僕射奉車都尉新沓伯臣濤言臣近啟崔諒史曜陳准可補吏部郎詔書可爾此三人皆衆論所稱諒尤質正一作止少華可似敦教雖大化未可倉卒風尚所勸為益者多臣以為宜先用諒謹随事以聞此上十九字長沙帖誤連羊欣書後晉侍中卞壺書大觀置三卷第八足下佳不朝劉與施俱闕恐是比中二字郎上獲諸誠一作城非文墨至便在舍事許改愛子紙下物知此草勿令一人見也吾今勅書事令不發案筆法當作友亟付卿發發便宻令人傳施云劉釋作傳非疑是防字之壺白晉謝發書大觀置三卷第二十五晉安素自强壯且年時尚可當延遐期豈謂奄至於此自畢逺境二三惋愕不能已已未欲㫖問悲酸悒悒想不久可得還耳執筆惻感此上三字潭帖誤連山濤書後米云已上二帖同章帝偽帖宋特進王曇書案曇首乃僧䖍之父也失一首字者下誤以首為荅耳大觀作王曇首置三卷第二十八昨服散差可施作耳然不過佳請示劉施作清和所當作亦宜如更增劇華本如更增劇字未能字俱糢糊潘本顧本俱完好恐難為力耳未能合施作令遣從施作俗有餘念故一作頓非耳王曇首和南宋中散大夫羊欣書三月六日欣頓首暮春感摧切割不能自勝當奈何奈何得去六日告深慰足下復何如腳中日勝也吾日弊難復令自顧憂歎情想轉積執筆增惋足下保愛書欲何言羊欣頓首米云同章帝偽帖宋太常卿孔琳書伯思云孔琳之帖有恨恨腳中轉劇近明散未覺益十二字偏小蓋行側注字摹帖者妄以入行耳當依本為勝孔琳按史名琳之大觀標目有之字日月深酷撫膺崩呌心肝分膾尋繹懊憹觸感隕絶孤思悒悒自羣書法疑地最施作窮字於書法為長當奈何不孝奈何念痛悼難勝得去月二示知潘本華本顧本俱糢糊泉本完良施作君所患故尔不差甚有幽悒上二字疑熱盛比復何似想已轉佳眠食極勝也善將治之孤子並疾患歎具施作歎歎非悒悒施云長睿作恨恨蓋恨與歎字本接續文理皆通腳中轉劇近明散未覺益孫帖覺益二字俱失眞惙頓何賴扶力迷甚劉作反陳作甚疑作亡不次孤子孔琳之奈何一合作等字頓首齊侍中王僧䖍書伯思云王僧䖍兩啟皆佳結字與擬王琰乞江郢所統郡啟同書聲信不虚得臣僧䖍啟劉伯寵陶瑾稱勅二岸雜事悉委臣判聖恩㒺已奬使入效斯實臣下驅馳至願且職事所司不應多陳雖奉今􅀢臣豈敢於外下意不先上聞正當磬率管見令官長啔審可否之宜會須恩裁此乃更亂天聽或致煩壅且得仍舊以待能者恐於事體二三惟允伏願少留神照察覽所啟非敢辭務懼塵聖化謹冒輸請伏追震怍謹啟臣僧䖍啟南臺御史謝憲乃堪驅使臣門義舊粗是所悉統内新故雜米數十萬斛實須督切憲今請假在此臣欲折以統攝庶得速辨其頻經督運已有前效謹以啟聞伏願聽許謹啟黃伯思䟦祕閣法帖三卷後帖已向季春等十七家此卷偽帖過半自庾翼後一皆一手書而韻俗筆弱濫厠諸名迹間始予觀之但知其偽而未審其從來及備員祕館因彚次御府圖籍見一書亟中盡此一手帖每卷題云倣書第若干此卷偽帖及他卷所有偽帖皆在焉其餘法帖中不載者尚多竝以澄心堂紙寫蓋南唐人聊爾取古人詞語自書之爾文真而字非故斯人自目為倣書蓋但録其詞而已非臨摹也國初論次法帖時如王著輩不悟其非但采名雜載眞帖可勝歎哉今列此卷内一手偽帖於左庾翼後一帖王循沈嘉劉超杜預後一帖司馬攸劉瓌紀贍劉穆之王廞王劭張翼陸雲十五家幷庾山濤預後一帖皆卞壺偽書右翼杜一手庾亮璠謝伯庾翼前一帖王徽之杜預後一帖王凝之王操之王坦之王渙之謝莊索靖王邃王恬䖍王僧王曇首孔琳之右十四家幷庾翼杜預前一帖皆眞帖法帖釋文考異卷三
