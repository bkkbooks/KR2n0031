front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0031_WYG_008-1a, image: WYG0683/WYG0683-0401a.png}
body:
  text: 法帖釋文考異巻八明顧從義撰王羲之書羲之死罪小大悉以來未惶施作惟疑不可懷未復諮一作咨黄諌作臨誨問懸情計賔命行應至遲卞公陳云是卞壼還具承一作年非問妹極得散力以爲至慰期等故爾耳因縁不多白羲上二字飛白之死罪黄諫作書非伯思云羲之死罪小大悉帖書殊惡末云因縁不多亦近代所爲耳案罪字草法不可辨豈鈎摹之誤耶不審定何日當北遇信復白遲承後問伏想清和士人皆佳適桓公十月末書爲慰云所在荒大觀帖荒下甚上多一筆如横波淳化有空甚可憂殷生數問北事勢復云何想安西庾翼也又謝奕以至能數面不或云頓厯陽爾耶無縁同爲歎遲知問此帖前四行多飛白大觀此帖接運民作一帖運民一作代非不可得而要當得甚慮叛淳化摹誤大觀改正散頃施亦作頃一作須爲此足勞人意頃至意七字大觀接上帖淳化另起作一行未知孰是八日羲之頓首多日不知君問得一昨書知君安善爲慰僕似施疑作比小差而疲劇昨若耶觀望淳化作宦字大觀摹作望字乃苦一作者輿上隱痛前後未有此也然一日一昔當作發勞復不極以此爲慰耳力不有飛白鄉一作得非里人樂著縣户今送其名一作不可爲領受君頃就轉佳不僕自秋便不佳今故不善差頃還少噉脯又時噉麫亦不以爲佳亦自勞弊散係轉久此亦難以求泰不去人間而欲求分外此或一作咸非速弊皆如君言便大熱足下晚可耳甚患此熱力不具大觀作乙乙王羲之上帖是一㸃當作白字凡帖中一㸃非疊字即白字也此書因周常有飛白侍想必至吾惟辨辨一作辦便有飛白知無復日也諸懷不可言知彼人已還吾此猶有小小往來不欲來者其野近當往就有飛白之耳不大思其方不見可久理而任之者悠然此可歎息得西問無他想彼人甚平安此粗佳元度許詢字來數日爲慰潘本右有錠紋有補痕左貫女字顧本有裂紋未補未錠中郎女頗有所向不今時㛰對自不可復得僕德當作往意君頗冷一作論按書法當作臨不大都此亦當在君耶發有飛白瘧比日疾患欲無賴末面邑邑反不有飛白具當作有王羲之當有言字或作白字之類得書知問腫不差乏氣勿勿面近羲之報足下各如常昨還殊頓匈胷通中淡悶干嘔轉劇劉施俱誤作亂食不可强疾高難下治乃甚憂之力不具施作乙乙王羲之伯思云足下各如常亦唐人作比初月帖差勝中云淡悶干嘔淡古淡液之淡干古干濕之干今人以淡作痰以千作乾非也據此當亦非今人所作得書知足下問吾既不佳賢内妹未差延期須狼毒市求不可得足下或有者分三兩按字畫類兩字停須故示得書知問吾夜來潘本夜來右有錠紋補㾗顧本有補㾗尚未下錠腹痛不堪見卿甚恨想行復來修齡王胡之也來經日今在上虞月末當去重熙旦便西與别不可言劉少此字不知安所在未審時意云何甚令人耿耿一昨得安西六日書無他無所知表亦復常言耳此帖多飛白帖語重本巻後濶轉久勞有飛白想豈舍知足下常得當作同之卒未近縁如何足下數令知問伯思云濶轉久帖云卒未近縁如何非晉人語十一月四日羲之白冬中感懐深始欲寒足下常疾何如不得近問邑邑吾故苦心痛不得食經日甚為虚頓力及不具施作乙乙王羲潘本羲右有錠紋有補痕顧本有裂未補未錠之白一本無白字周益州送此卭竹杖山海經卭山之竹節髙中實可作杖卿尊長或須今送案右軍與周益州書凡廿許帖即今之十七帖也銓次者誤置兩巻中耳周撫字道和穆帝永和三年桓温攻成都李勢降以撫為益州刺史鎮彭模擊范普獲之益州平封建成公在官十年卒蜀人廟祀之不得執手此恨為深足下各自愛數惠告臨書悵然恨告臨三字飛白阮公案此二字當是既月故爾可憂時放恕大事今令速言何万一作方守篤大灸黄諫作惡不將力而從事以至甚無計自必出唯須小佳鐵石今出求救足下可復潘本顧本修内司本泉本俱闕半字獨大觀復助二字相連摹正助旦令得通伯思云阮公故爾一帖非逸少書家月末當至上虞妹亦俱去此蒸濕難爲人得示知足下故爾堪行想不成病耳吾至無賴行尅王羲之頓首米云子敬代父書伯思云蒸濕帖米云大令代父書非也蓋結字殊不同詞亦異晉體淳化大觀已上三帖絳帖合而一之不得西問耿耿有飛白􅏀施釋注云劉釋作近令送此宅圖近字與下文詞意似舛而與水邱之􅏀字筆法正同當作邱彦逺帖録云今與􅏀山陰書借人又語􅏀令臨葬借輕車竊意即此邱令也右軍宅在越之蕺山今爲戒銖寺𨽻山陰庸非此宅圖耶令送此宅圖云可得卌畝爾者爲佳可與水􅏀一作近共行視佳者劉作往告陳云當作佳者決便當取問其賈謝生多在山下不復見且得書疾惡冷耿耿想數知問雖得還不能數可歎已上半帖重見七卷不審比出日集聚不一爾緬然恐東旋未期諸情罔飛白不能乃佳意乃篤好此書至難或作復與卿羲之白昨故遣書當不相遇知君還喜慰足下劉作足下施作重慰案大觀摹帖失去足上一㸃故施作重慰字時行想今善除劉作保陳施作除猶耿耿僕時行以十一日而不除同前如比日便成委頓今日猶當小勝潘本小勝右有補痕有錠紋顧夲有裂未補未錠不知能轉佳不積不卿至劣劣力還不具王羲之白一本無白字不審復何比一作以永潘本永右有錠紋有補痕右貫小勝字錠紋左貫當字顧夲有補㾗未錠日多少看未九日當採菊庭堅作藥謂失一筆非也不至日欲共行也但不知當晴不耳倫等還殊慰意増慨知足下疾患小佳當惠縁想劉與施俱作必施釋云張芸叟侍郎得陳思王書雀鷂賦墨蹟伯思論其僞如字晉魏六朝草止如行書故前輩云必字無草書是也宿觀右軍諸帖皆然獨此帖中劉氏用唐人草法釋作必字疑未是案下筆㸃法當作君字能果遲劉施陳皆作遲案書法當作返此善散非直思想而已也尋復有問足下以數示此行下有一字空因下文由爲二字連筆寫不能容故耳由爲諸力不具施作乙乙此帖内多飛白月半哀感柰何柰何念邑邑罔極之至不可居處比日何似痺差不悒悒力知問王羲之頓首米云子敬代父書伯思云月半帖雖晉人語字不合作蓋後人寫二王尺牘中語耳知彼乃爾切切汝乃獨坐但有憂邑懸逺不能得遣人且吾無復久意果去當南視汝等也一昨得安西六日書無他無所知劉作大說故不復付送讓都督劉作共非表亦復常言耳如兄子書道嵩自必果今復與書督劉作共非之足下勅令至并與逺書也伯思云修齡王胡之也重熈郗曇也安西庾翼也其云一昨得安西六日書無他無所知說故不復付送讓都共或作督表亦復常言耳案翼之鎮荆州以石虎衷暴屢表請北伐康帝及朝士皆遣使譬止孫綽輩亦致書諌之則逸少所見之表殆亦論北伐事也翼之此舉朝論弗以爲然故逸少以爲常言及聞其遷襄陽乃云稚恭遂進鎮東西齊舉想尅定有期也則始雖同羣議而終以爲當猶趙充國之計䍐羌初是之者十三中十五最後十八有詔詰前言不便者皆頓首服無足恠也然翼有志無年徒奮十倍之氣而蔑一統之功此志士所嗟慨者逸少所書進鎮帖唐張彦逺載於書録今聞在王仲修家奉黄甘二百不能佳想故得至耳船信不可得不知前者至不尊夫人不和想小爾今以佳念累息卿佳不吾故劣劣力知問王羲之敬問米云僞帖日五期結極以大先師之言皆著潘本右有錠紋有補㾗顧本有補㾗本下錠推此言之無騐如此事君當欲知故及冝停宅先生適書亦小小不能佳大都可耳書都可耳飛白三月十六日羲之白一昨省不悉雨快君可不万石謝万字轉差也灸得力不不得後問懸悒不去劉作知懷君云當有㫖信遲望其至僕劣劣故遣不具施作乙乙還具示王羲之取卿女聟壻同案干禄字書聟􅀈壻上俗中通下正劉與施誤分聟爲知耳兩字爲長史休大觀與黔江帖立人作二㸃種一作稚知疑作不何似耿耿適欲遣書云得示知足下得涼以爲佳其慰知潘本慰知有錠紋顧本未下錠多疾患念勞心吾潘本吾右有錠紋有補㾗顧本有補㾗未下錠故不欲食比來劉與施合作幾又作以來以爲事恐不可久邑邑一作區區潘本有補㾗右貫一行顧本此同思面行疑作拜字故果之王羲之此帖又見續帖第四卷無尾後六字米定爲智永伯思刋誤謂非右軍書然所䟦續帖復以爲真但䟦在崇寧丙戌刋誤又大觀戊子所著也潘本之字有補㾗顧損本同此郡之弊不謂頓至於此諸逋滯非復一潘本復一右有錠紋有補㾗顧本有補㾗未下錠條獨坐不知何有飛白以爲治自非非字可疑中闕一筆諸本皆同獨大觀摹正常才所濟吾無故舍逸而能勞有飛白歎恨有飛白無所復及耳夏人事請託有飛白亦所未見劉作怱非施作免小都冀得小差須大觀作頃日當何理伯思云此郡帖米謂與王述書非也逸少與藍田方隙而爲屬郡既撿察苛急主者疲於課對正救過不暇豈復尺牘間自彰其逋滯哉此帖官本傳摹甚失真如以就勞爲能勞小却爲小都皆轉失草法也又云逸少十七帖本唐貞觀御府中書張彦逺云王草書烜赫著名帖也僕謂當時書巻首帖有十七日字故諸帖總謂之十七帖耳非帖數也本二十七條今官法帖有其十五散寘逸少書三巻中又續法帖有五而卭竹杖絲布衣漢講堂諸葛顒天䑕膏四果種虞安吉七條不載當是亡軼而世有完巻者傳摹殊精非此比也此巻有帖云周益州送此卭竹杖卿尊長或須今送僕案十七帖云去夏足下致卭竹杖皆至此士人多有尊老者皆即分布令知足下逺惠之至以前帖觀之即知此帖蓋與周益州矣自昔相傳十七帖乃逸少與蜀太守者未必盡然然其中蜀事爲多是亦應皆與周益州書也但來禽一帖則或以爲與桓温而已本朝僧邦者有寄李昌武翰林詩云來禽簡寄桓宣武不知何據案此帖有云今在田里惟以此爲事足下致此子者大惠也逸少視桓公位殊寥絶與書不當爾爾然當時真長子猷輩猶嫚侮桓公彼亦能容逸少作書若交友蓋無足恠温飛卿詩云畫圖驚畏獸書帖得來禽此帖垂寶非一也法帖釋文考異巻八
