  text: 欽定四庫全書史部十四
  hash: sha256:1b0fee061afb4650a390a33f011206c9ad39b5a17ebb7b4f5e965df0aa8e4e0c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0031_WYG_000-1a, image: WYG0683/WYG0683-0357a.png}
body:
  text: 法帖釋文考異目錄類二金石之屬提要臣等謹案法帖釋文考異十卷明顧從義撰從義字汝和上海人嘉靖中詔選善書者入殿直應試稱㫖授中書舍人直文華殿隆慶初以預修國史成擢大理評事其楷書行草宗鍾王徑尺大字仿顔趙甚為文徴明王世貞父子所重此乃所作淳化閣帖釋文於前人音注辨其訛謬析其同異依帖本原次勒為十卷手自繕寫而刋行之閣帖自米芾黄長睿秦觀諸家而後踵加考訂者寥寥無幾從義始參彚羣説輯成一編後來評帖者每以為據而識見淺近又不得善本以相校勘故搜羅雖廣而精審未臻今者恭逢我皇上幾暇臨池折衷藝苑特取内府所儲閣帖遴其初搨最佳者為淳化四年賜畢士安本命内廷諸臣詳加校訂選工摹勒復還舊觀其間蒐集諸家釋文至為賅備凡是非得失之故仰荷睿裁鑒定勘核精詳洵足嘉惠􅋵觚永垂奕禩其從義所長者既已悉資採取誤者亦已駁正無遺是書原不過為白茅之藉特行世既久其用心之勤至亦頗有可取者故仍錄而存之以不沒其薈稡之功焉乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀法帖釋文考異原序淳化法帖以閣本為祖而後臨摹傳倣刻者紛紜猶子母相生孫曾相因雲仍耳禾愈逺而愈䧏即温陵一搨乃有四十二家其他不可推乎刻者既無伏靈芝之絶技鑒者亦無歐率更之妙賞肥瘦失眞巧拙莫辨遼豕宋璞之流人自為寶相持而莫肯下幾何其不為聚訟哉上海顧氏自御醫公以來世以博物好古相授受江東推為文獻之族迨及廷尉汝和尤鍾情金石好無以尚秦宮漢寢之刻積案支牀每覩一碑覯一碣傾赤仄而不能償往往捐架上圖籍與室中之釵珥更或索米胡奴以益之致必獲而後已既得則摩挲諦玩忘寢與食㡬於紙弊墨渝而猶不忍去手購求日廣討論日博辨析㡬㣲卓有定見審波磔而知人代㝷㸃畫以分郡國美惡察之絲縷眞贋較於毫毛以為蘭亭有考絳帖有評獨俾是本寥寥紫可奪朱乎於是釋其訛譌考厥異同勒成一家之言傳諸好事之口手自繕冩以授鋟人嗚呼斯不可謂之癖與抑古之所謂癖者寧獨一汝和哉揚雄之太𤣥杜預之左氏王濟之馬支遁之鶴劉伶之酒稽康之鍜與阮孚之蠟屐癖等耳其逸情髙韻足以垂照簡編流響千古談者津津至今有遺味焉盖即甘蟠蟲啖指爪嗜瘡痂好驢鳴亦皆使人解頥而忘倦豈非玊之有瑕勝石之無玷乎汝和此書吾益取其癖焉而已世故有同汝和之癖者庶㡬得免於覆瓿也夫太原王穉登序
