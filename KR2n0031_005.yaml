body:
  text: 法帖釋文考異卷五明顧從義撰蒼頡書伯思云自蒼頡至程邈書皆偽史籕書傳世者岐鼓耳今此書云楊州裵易徳系字殊無三代體與其辭皆唐人筆也李斯書米云未知何人書㒒案其文云田疇耕耨為政朞月而致灋令使父子為鄒魯乃李陽冰篆王宻所撰明州刺史河東裵公紀德碣中字也其碑畧云驚逋復田疇闢教以耕耨故為政可朞月而致寛之則法令非行公之化夷俗為鄒魯使父子長㓜各得其宜此帖乃摹田疇等十八字為斯書與碑中篆無銖黍差而米云未知何人書蓋未嘗見此碑耳程邈在秦雲陽獄作𨽻字迺今漢碑中字是也有此頡書𨽻方生今正書不應邈已作之大觀標目作史倉闕夏禹書劉釋闕出令聶子星記齊春當作其尚施釋魯司冦仲尼書烏延有呉君子之墓呼施釋史籕書唐劉作楊施作剔案碧落碑有唐五十三禩唐字正與帖同王著蔡京輩皆未考此碑耳何不闕疑以誤後學州裴易徳系秦丞相李斯書田疇耕耨為政朞月而致法令使潘本使字有補痕左右貫一行右有錠紋顧本有補痕未下錠文本有闕二条俱未補父子為鄒魯米云未知何人書秦程邈書大觀標目作秦御史程邈書天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以為為天下正其致之天無以清將恐歇米云同章帝偽帖宋儋書伯思云宋儋唐明皇時人學鍾書但作側戻殊失大勢王著録此書不知乃唐士意為逺古人故與斯邈竝列其誤至此儋有嵩山圭禪師等碑傳於世字亦不甚工自一接拜情同兄弟沈吟緬懷固非小子之所勤及也策質前謝恐乖昔賢共弊之道晦事勿語且絶一作作非當作紀詩人匪報之實遲徊循驅偭俛未已殆將有辰矣足下多可不恠髙情内含如筠斯清比蕙又暢儋不以感氣厚而修詐自廣不以撫已多而私頌作徳未致力謝馳懷宣書何陳萬一也悚息今秋盡野外草木變衰長郊蕭條風物凄𦂳清都久客莫復相親足下退食公庭睡罷私室櫛沐晞景收視解聽豈念歲華不待厭倦為旅之士哉頃者釀玉初令弦絲正調竟大觀少末筆一鈎欲左携鄭君幽指藥妙右對董叟髙談道微情酣潘本情酣右有補痕貫六行左有錠紋顧本補痕同而無錠紋世忘浩去塵粃思足下能順試實其事為何如哉時聞眞聲逈閒笙鶴此復異於人境耳可以息宴可以嘯歌久不閒然期今日潘本今日字起有補痕左貫五行至衛夫人帖耳字止今日右有錠紋顧本補痕同而無錠紋之事也倚候騎氣自豫光臨幸甚謹馳疏不得具一作乙乙宋儋白衛夫人書伯思云衛夫人帖蓋唐初李懷琳作事見竇臮述書賦如續帖中稽康絶交書世傳七賢帖皆懷琳偽蹟也此與師帖尤疎繆案蕭子雲答武帝勅云臣昔不能㧞賞随時所貴規摹子敬多歴年所秊二十六著晉史至二王列傳欲作論草𨽻法言不盡意遂不能成十許年始見勅㫖論書一卷商畧筆狀洞徹字體始變子敬全範元常逮爾以來自覺功進此偽帖云但衛随世所學規摹鍾繇遂歴多載年卄著詩論草𨽻又云筆勢洞精字體遒媚皆竊取子雲啟中語欲小改之遂失其句讀今世髙識豈無何不悟此又衛夫人乃晉李矩妻李充母名鑠字茂猗既與師書自當署名不但稱夫族及姓也以數事考之其偽不疑又前輩論此帖以其勅字從力館從舍為偽未中其病蓋自二王以來偽字甚多陳為陣䇿為莢皆二王輩自製不可㨿此定眞偽也案茂猗廷尉展之女恒之從妺汝陰太守李矩之妻伯思謂既與師書自當署名不但稱夫族及姓也愚謂春秋婦人稱姓如周女曰姬宋女曰子齊女曰姜書是也伯思未之考耳大觀標目作晉衛夫人衛稽首和南近奉勅冩急就章遂不得與師書耳但衛随世所學規摹鍾繇遂歴多載年廿著詩論草𨽻通解不敢上呈衛有一弟子王逸少甚能學衛眞書咄咄逼人筆勢洞精字體遒媚師可詣晉尚書館書耳仰憑至鑒大不可言弟子李氏衛和南古法帖知賢弟至舍晚寒想顧之傷歎遂爾永惟痛壽春富陽范道長體氣以施作似小勝前日得此暑大都尋常新婦書寄物示諸人散騎二君何時還兄一作允非子皆佳能數為也朝法帖伯思云隋朝書中敬字闕其波蓋淳化中摹此書時特省去避諱耳或指此目為偽帖非也大觀標目内無朝字皇帝敬問婺州雙林寺慧則法師朕尊崇聖教重興三寶欲使一切生靈咸蒙福力法師捨離塵俗投志法門專心講誦宣揚妙典精誠如此深副朕懷既利益群生當不辭勞也猶寒道體如宜今遣使人指宣往意隨僧智果書伯思云梁武帝書評乃命袁昻作者其答啟云奉勅遣臣評古今書臣愚短豈敢輙量江海但天㫖委臣斟酌是非謹品字法如前此云梁武帝評書誤矣袁昻不以書名而評裁諸家曲盡筆勢然論者以其評張芝書云如漢武愛道憑虛欲仙則欲仙而已至況薄紹之書乃云如仙人嘯樹則眞仙也為比擬失倫此亦一病也寫此者字法局束天然大少疑非智果書果號得右軍骨借譽浮其實亦不至爾梁武帝當是袁昻評今作武帝者豈下脫勅袁昻三字耶評書從漢末至梁有卅四人王僧䖍書猶如揚州王謝家子弟縱復不端正奕奕皆有一種風氣王子敬大觀少一波書如河朔少年皆充悅舉體㳫拖而不可耐羊欣書似婢作夫人不堪位置而舉止羞澁終不似眞阮硏書如貴胄失品次不復排突英賢王儀同書如晉安帝非不處潘本右有補痕有錠紋顧本有補痕未下錠尊位而都無神明殷大觀少一波均書如髙麗人抗浪乃不有意氣而姿顔自足精味徐淮南書如南崗士大夫徒尚風軌然不寒乞陶隱居書如呉興小兒形狀未成長而體骨甚峭快呉拖書如新停傖音當呉人罵楚人曰傖父一往似揚州人共語語便態出栁産書如深山道人見人便欲退縮曹喜書如經綸道士言不可絶王右軍書字勢雄强如龍跳天門虎臥鳳闕故厯代寶之永以為訓蔡邕書骨氣洞達爽爽如有神力程曠平書如鴻鵠弄趐頡頏布置初雲之見白日蕭思話書如舞女低腰仙人嘯樹李鎭東書如芙蓉之出水文彩如鏤金桓𤣥書如快馬入陣随人屈曲豈須文譜范懷約一作均非眞書有分草書無功故知簡牘非易皇象書如韵音繞梁孤飛獨舞孔琳之書如散花空中流徽自得李巖之書如鏤金素月屈玉自照薄紹之書如龍㳺在霄繾綣可愛秦獄吏程邈善大篆得罪始皇雲陽獄增減篆體忠大觀作志其名名其書目𨽻也扶風曹喜後漢人不知其官善篆及𨽻篆等少異李斯見重一時耶鍾司徒書字有十二種意外巧妙絶倫多奇崔子玉書如危峰阻日孤松單枝邯鄲淳書應䂓入矩方圓乃成師宜官書如鵬翔未息翩翩而自逝梁鵠書如龍威虎震劔㧞怒張張伯英書如武帝愛道憑虛欲仙衛恒書如插花舞女援鏡淳化少末筆一鈎大觀全笑春索泉本此下闕半卷靜當作靖或古人通用書如飄風忽舉鷙鳥乍飛鍾繇書如雲鶴逰天羣鴻戯海行閒一作間古無間字同用茂宻實亦難過耶孫本此帖以下俱闕何氏書伯思云何氏書若云何人耳或以為何姓非也米以二帖為歐陽率更書良是投老殘年西崦已逼恒大觀少末一筆慮儵忽歸骸𤣥大觀少末一㸃壤溘爾冥滅竟大觀少一鈎不一言以以字閣本闕下筆一㸃此在懷預為其備於兹路唯有憑心他餘不能有益年將八十可以意求欲望長存何可得潘本何可得右有第五卷三字也潘本也字右有十四二字道潘本道右有張範二字大難俗情見善從善如登潘本右有錠紋見惡閣本闕歇筆一㸃行惡如崩必須筞怠惰勤精進愛日惜力乃可獲耳吞聲飲氣不身頓爾他陳作地便生異議速自詳答取竟此字疑勿滯留也十六日去留深情故當所爾餘散輩停歲積故切忽歸三月下旬還非賖冀叙不遥南路行乃寂絶傷心蔡琰書案大觀標目作東漢蔡琰書我生之初尚無為我生之後漢祚一作祀非衰米云同章帝偽古法帖伯云敬祖鄱陽二帖大令部中已有此重出耳敬祖王導子武岡侯協也與大令不同時恐非其書敬祖日夕還山陰與嚴使知唐摹一本作君聞頗多歲月余屬天寒擬適逺為當奈何奈何爾豈不令念姊逺路不能追求耳此帖重見十卷鄱陽歸鄉承修東轉有理吾賢畢欲事必俟勝歡慰於懷耶吾終權宜至承今年饑饉仰惟年支都乏絶不謂乖又至于此耶吾腳尚未潘本顧本俱闕上一畫差極憂也此帖重見十卷米云二帖並子敬孤不度德量力欲俟古伸字義於天下而措劉與施闕史作智術淺短遂至昌蹶然至于今日志猶不息若謂計一作此非將安出伯思云孤不度徳量力與董卓以來二帖皆諸葛傳中與昭烈問答語有一段自孫權㨿有江東以下與此文脉相接誤寘第十卷王大令部中皆章草書雖字畫大小微異而筆勢若一大是全冩亮傳首語此文雖出亮言亦史家潤色之又中云亮曰亦史家所記米遂謂亮書差千里矣僕謂此帖當是逸少書蓋與此公章草豹奴帖筆法同亮曰劉施作白史作曰案章草書法曰是董卓已來豪傑並起跨州連郡不可勝數曹操比於表劉施作袁非紹則名微而衆寡故能尅紹以弱為强今日擁百萬之衆協挾天大觀上多一筆子而令諸侯誠能不可與劉作九陳云非爭峰施釋鋒峰通用也米云並諸葛書大觀以尅紹以弱另作一帖標唐張旭書不知何㨿僧懷素書大觀標目作唐僧右軍云吾眞書過鍾而草故不減張㒒以為眞不如鍾草不及張所為世之所重以其能懷素書之不足以為道其言當不虛也米云同章帝偽張旭書大觀二帖作一帖標目作隋僧智永書足下晚復施作後非不知疾痛如何深極憂難比也上下安之必得發耶得足下十五日問為慰㒒前患差張旭書古法帖伯思云移屋有意適閑曠二帖眞羊中散書與唐薛邕家所畜筆精帖字勢同與法帖本部中三月六日帖殊不類彼六日帖乃偽也筆精帖眞羊公得意書或以為逸少則過矣案余新刻本失摹帖字因傳搨已多不復補完既移屋近西􅀈㣲援援欄也裡地成大寛援裏起小三架如步廊政可一丈梁得使二家通出入作門閤也此屋之東故應作墻宜施作直步廊一壁太單恐園中彌宜大觀此下接重復以下七字作一行移三間屋故當不甚難重複粗盡一作畫義當作畫圖如别大觀此下接移三間九字作一行案文義當以大觀為正耳足下既有意適閑曠亦當惡暑耶逰矚踈數慰對告今少吾今年病垂耳施云疑與下文耳字草法亦異始小差大小㑹使疾惽忽移日耳每每施作日深望逺言慰尚賖慨然𤣥過施作昌云劉誤寄與音介一作分非𤣥過寄與音介六字案寫法當作𤣥昌之問可令晉介八字勿勿書復既與宜人潘本有補痕錠紋貫後三行人有濶三字文本同顧本有補痕未下錠而三字完好理略絶施作紀非何縁復有周旋理長史斷濶亦不減卿唯公事時相文本未補有闕瞻望耳吾面信遂至今不着不可解計至故應必有香但不知好惡云河耳須得米云須得當作欣白與上一帖皆羊欣書法帖釋文考異卷五
