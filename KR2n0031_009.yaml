body:
  text: 法帖釋文考異卷九明顧從義撰晉中書令王獻之書伯思云此卷王大令部偽者最少相過終無復日借匪獻之韻自可賞相過終無復日悽切在心未嘗暫掇施與陳辨作撥一日臨坐目想勝風但有感慟當復如何常謂人之相得古今洞盡此處殆無恨于懷但痛神理與此而窮耳盡此感深殆無冥劉闕施作置處常恨況相遇之難而乖其所同省告不覺灌施作滻流既已往矣當作員亦復何言獻之米云無名人偽諸舍復何如吾家多患憂面以問慰情不知可耳永永嘉比復患下上下諸疾患乃爾燋馳豈可懷不審今復何如嫂即平和耳貞夀不成病不鵝還慰姊意潘本右有錠紋有補痕右貫兩行至復字顧本有裂未補未錠今已嘗施與陳俱作當向發分張諸懷可言殊嘗同上復憂縣婢腹痛見差不劉家疾患即差秀已還也伯思云鵝還慰姊意帖鵝者王氏子姓之小字耳猶袁羊顧虎之類或以此鵝即逸少所愛之鵝甚可鄙笑諸女無日事懸心阮新婦何日至至一作慰姊目下一帖有君書二字獻之死罪授衣諸感悲情伏惟哀慕兼慟痛毒難居見徐俊并使君書承比極勝但承此凶問當復大頓耳比日憂馳無復意不審尊體云何腳及可痛氣得此哀號何如先大惡時灸創古瘡字特不堪此不乃為患眠食幾許使君今地實難為識然所以為識政在此耳大觀帖此下尚有四十二字伯思云授衣帖厯世所傳自為一卷法帖中亡其帖尾政在此耳下當云當今可復使不萬全不願其以多算難易得之便自可令不為因絫耳比者忉怛當不可言當不可言獻之死罪法帖無此四十三字又其間多有燥筆及魚食處而官帖不復依本其失多矣獻之白奉别告承安和慶慰極冷不審尊體復何必諸本皆作必劉施作如獻之比日如復小勝因夜行忽復下如欲作帶今服藥盡溫燥理冀當可耳然異極都不得復小失和卿黃諫作已惡亦不復得妄近生冷體氣頓至此令人絶歎行黃諫作何有佳酒劉作治陳施作酒便服大觀帖此下多獻之二字字亦微大施謂别用摹入此帖者想彼悉佳汝復見諸女不此上施作近下故爾耳獻之白一無白字承承姑比日復小進退其爾不得一極和憂悚猶深不審比劉作以服散未必得力耳比驎張堪小字也相聞故云惡懸懷使君數得書也有飛白獻之白思戀觸事彌至獻之既欲潘本右有第九卷三字過餘杭州將若比還京必視之來月十左右便當發奉兄當作見無復日比告何喻願復盡珍重理獻之白一本無白字獻之白節過歲終衆感纒心伏惟同之奉月初告承極不平復頭眼半體􅠰恆惡兄告説姊故殊黃瘦憂馳可言寒切不審尊體復何如眠食轉進不氣力漸復先劉作先施與陳作充案筆法當作克耳遲復潘本復右有錠紋有小補䀶旨告獻之故爾獻之願餘餘施云此帖前段已亡無文義可考上一作近非下安和知婢日夕疏慰意育故羸懸心倪比健也上二字飛白適奉奉永嘉去月十一日動靜故常患不寧諸女無復消息獻之再拜夏節近感思深惟窮號崩絶不可忍處晴快不審體中何似食噉復多當作知少甚馳情不審諸舍復何如未復西動靜不寧此多患反側願深置勉故承問思戀無往不慰省告對之悲塞未知何日復得奉見何以喻此心潘本此心右有錠紋顧本有補痕無錠紋惟願盡珍重理遲此信反復知動靜十二月草七日具疏操之獻之再拜歲盡無復日感思兼懷不自勝兄亦同之奈何奈何奉十二日告承承掾安和慰馳情姊三兄諸患故爾不損憂馳晴快不審尊體並復何如遲復來告操之故平平己再服散冀得力獻之亦忘劉與施作惡或是忌字憒勿謹拜疏不具操之等再拜衛軍猶未平和而哀勞殊未得盡消息理常以不寧僕射得散力甚慰表解臺職不知得恕不復冠軍告疑作首懸企文本有裂紋貫後行息字獻之白兄靜息應佳何以復小惡耶伏想比消息理盡轉勝耳礜石深是可疑事兄喜通作喜患散輒發癰勢為積乃不易願復更思獻之唯賴消息內外極生冷而心腹中恆無他此一事是差但疾源不除自不得佳論事當劉作常陳施作當隨冝思之也獻之姊性纒綿觸事殊當劉作常陳施作當不可獻之方當長愁耳施云自姊性纒綿以下載續帖中第二卷右軍部字體一同伯思云靜息帖云賴消息內外極生冷內外二字本行旁注故字差小而昧者摹填著行中非也當依本為勝諸帖中此例甚多如十七帖中逺想慨然孔琳之帖恨恨腳中轉劇等字本皆側注後人摹以入行雖失格體猶於理未害至於讀蘭亭敘者以不知老之將至旁一僧字為逸少作曽字之誤借使摹入行中則害理矣案古蘭亭敘本二十八行至第十四行間特濶者蓋接紙處而不與知字適在此行之末梁舍人徐僧權於其旁著名當時謂之押縫梁御府中法書率如此而此帖僧字下亡其權字近世人殊不知此乃云僧者曽之誤因讀為曽不知老之將至非也又案晉史逸少本傳及書録第十卷皆載此敘但云不知老之將至而無曽字蓋可是正乃知善摹帖者勿問其黵滅注闕橫斜細大一放其本而不小異乃不失真矣今法帖多妄更易之至以注字入行大小既殊體不綴屬後人不曉從而效之一行之中洪纖頓異號子母體如第五卷近世偽作釋智果書是也每一觀之使人深慨散又云靜息帖云礜石深是可疑事兄喜患散輒發癰者寒食散之類散中蓋用礜石是性極熱有毒故云深可疑也劉表在荆州與王粲登障山見一岡不生百草粲曰此必古冢其人在世服生礜石熱蒸出外故草木焦滅鑿看果墓礜石滿塋又今洛水冬月不氷古人謂之溫洛下亦有礜石今取此石置甕水中水亦不氷又鸛伏卵以助暖氣其烈酷如此固不冝餌服子敬之語實然聊附于此草又云異苑魏武北征踰頓升領眺矚見山岡不生百王粲曰是古冢此人在世服礜石而石生熱蒸出外故卉木焦滅即令發看果得大墓內有礜石滿塋此段本草誤列在礬石部此云劉表障山當别有出獻之白不謂鄱陽一門艱故至此追尋悲惋益不自勝奈何奈何政坐視其滅盡使人悲熟賴子高在此不潘本此不中有補䀶右有錠紋文本顧本有裂未補未錠爾無可成獻之阮新婦勉身得雄甚善散騎潘本散騎左冇錠紋有補䀶左貫五行右貫一行文本顧本有裂未補未錠殊常施陳辨作當喜也雖奉對積年可以為盡日之歡常苦不盡觸頗一作額之暢方欲與姊潘本顧本泉本皆闕中一筆極當年之足潘本之足間有錠紋有補䀶右貫二行顧本有裂未補未錠以之偕老豈謂乖别一作列伯思及施俱作反至此諸懷悵塞實深當復何由日夕見姊耶俯仰施作纒綿悲咽實無己己唯當一作常絶氣耳伯思云奉對帖云方欲與姊極當年之足以之偕老豈謂乖反至此當是與郗家帖也案子敬病篤請道士上章法應首過子敬曰不憶餘事惟省與郗家離婚子敬前室郗曇女也郗氏自太尉鑒後為江左名族其姓讀如絺繡之絺而世人以俗書郗字作郤因讀為郤詵之郤非也郤詵乃春秋晉大夫郤縠郗鑒乃漢御史大夫郗慮之後姓原既異音讀逈殊後世因俗書相亂郗郤二姓遂不復辨亦近代氏族及小學二家之學不講故也陸魯望博古矣其詩有云一段清香染郤郎亦誤讀也今因郤氏帖聊爾及之以糾俗繆梁中書郎虞和表云逸少為會稽子敬為吳興故三吳之地偏多遺迹又是暮年遒美之時今此卷中亦時有吳興帖然大令帖傳于世佳者尚多如乞假表庾公帖周姊帖洛神賦劉氏所藏十二字等帖官帖中皆遺之頃以韻語題河南王氏所藏子敬帖云君家大令書盈紙茟勢翩翩趣多媚雖云沓拖如少年豈至拘攣同餓𨽻會稽七子五知名此公風概尤超詣太極璿題猶重書謂石書太極殿榜一時凜凜標英氣半袖精裓衆爭求數幅新裙世尤貴當時親遇得己難況復傳今僅千歲龍珠歸浦劍還津此帖君藏真得地才披尺許目增明鸞跂鴻驚欲飛逝硬黃響榻若傳吾完碧摹刊願垂世聊爾以記大令書事漫附于此碧字疑夏日感思兼悼切割心懷痛當奈何得思道書慰意薄熱汝比各可不吾並故諸惡勞益勿勿獻之白疏獻之白思戀轉不可言瞻近而未得奉潘本奉下有補䀶左貫還字文本顧本同見或作具但有歎塞遲諸作還具動靜獻之施釋多一白字潘本右有小補䀶顧損本同白東告具天寶疾患問何其倉卒乏一作令子有飛白孫常欣倫早成家以此娛上下豈謂奄失此女愍惜深至惻切心懷嫂哀念當可為心情願不可保使人惋惋悲政當劉釋作常隨事豁之耳嫂先積弊復有此痛心不審不乃惡不甚以憂馳眠食復多少願遣無益盡消息理吾十一日發吳興違逺兄姊感戀無喻慶等别不可言比奉告故多患姊經恐是纒字感按經感二字特小亦似以旁注摹入行者極頓憂馳益深適咨議十六日告風疾故爾反側餘可行未東動靜不寧五宜速吳與丞别兄進猶戀岡勞亦極惡馳情二女晚生皆佳未復一作後華薑疏比來得直疏故惡故足疑是云字當視示旁闕一點潘本顧本泉本皆同華也汝兒女並可不草九日獻之白昨遂不奉恨深體中復何如弟甚頓勿勿不具獻之再拜有飛白伯思云草九日帖云昨遂不奉恨深此近世人語非子敬書承服腎氣丸故以為佳獻之比服黃耆甚勤平平耳亦欲至十齊劑通當可知得書為慰吾先夜遂大得服湯酒諸治漸折大觀作相故頓極難勞知足下便去不得面别悵劉作快非恨深保愛臨書增懷王獻之元度時往來以此為慰興公孫綽字使適還數日具都下問人情所憂良可歎息諸吳劉作從陳施作吳數問齡前來經日極為差云仁祖欲請為軍司不知行不米云無名人偽帖伯思云元度時來一帖米以為無名人作僕謂此真晉人語但筆勢疏緩多失落耳謂大令書則非蓋中云仁祖欲請為軍司案獻之以晉孝武太元十一年年四十三卒上推謝尚於穆帝升平元年卒時獻之方年十三請軍司又在升平前大令是時才十許歲安得已作書論時事殆是穆帝時他人書第十卷元度何來遲亦此類慕容有易賴意耶米云無名人偽薄冷足下沈痼已經歲月豈冝觸此寒耶人生稟氣各有攸處相示消息益部耆舊傳今送想催驅寫取了慎不可過淹留吾去月潘本右有錠紋有補䀶左貫四行顧本有裂未補未錠從孫家求信信次頓爾頻為亂反側餳大佳栁六惠言餳可常餌亦覺有益耳米云已上二帖並歐陽率更書伯思云薄冷益部二帖米以為歐率更書實然但米誤以益部為益郎蓋下接耆舊傳字此帖蓋借陳壽所著益部耆舊傳也前告先以陳事意必是更有家信未知期説見德逺書所致潘本右有錠紋有補䀶右貫二行人耶施作勞誤何可足下今施作足念一本作云云耶耶字下又有一乛一釋作何可足下今水門米云無名人偽帖鬱鬱潘本鬱鬱右有第九卷十四五小字澗底松離離山上苖以彼徑寸莖蔭此百尺條世胄躡高位英雋沈下僚伯思云詠史詩鬱鬱澗底松數句乃集大令書一月草九日告仲宗奉世諸兒禍變無常伯思云一月二十九日黃門帖亦王氏書而非大令也黃門隕背哀痛摧剝不自勝任奈何李何及書感塞父姑告令一作念外甥知一作欲非問郗新婦更篤憂慮深獻之白思戀轉不可言瞻近而未得奉見但有歎塞遲諸信還具動此帖重本卷後尾闕四字泉本闕此一帖承冠軍故爾不覺轉勝灸無所覺憂馳深汝燋㥩可耳施作言謂劉誤作耳十卷內重此帖但書法大異可必不耳企遲此大都如常秀順至慰意順心痛委頓燋勞諸舍不能集會深哽此下十八字泉本闕塞仰料靜婢自常不和知從事甚簡致此佳也有飛白法帖釋文考異卷九
