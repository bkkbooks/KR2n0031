body:
  text: 法帖釋文考異卷二眀顧從義撰後漢張芝書伯思云唐文皇右軍傳贊云伯英臨池之妙無復餘蹤當是時逺購冥搜古帖畢出而御府所蓄其富無倫尚無伯英書後世豈可復得非特唐也晉世見者亦寡故庾翼與右軍書云昔得伯英章草十紙過江亡失常歎妙迹永絶此卷草草芝白一帖差近古亦疑先賢摹放也前知汝殊愁以下五帖米云皆張長史書信然但帖中有云數往虎丘祖希時面祖希張玄之字也玄之與大令同時虎丘地耳在江左當是長史書二王帖辭知汝殊愁且得還為佳也冠軍暫暢釋當不得極蹤可恨吾病來不辨行動潛不可大觀帖合不可共作處字後羲獻帖語亦有潛處字以義詳之要是王著誤分也耳終年纒此當治施總釋注云治字本復字淳化帖摹差劉作治按大觀帖摹正作復何理耶且方有諸分張不知比去復得一會不講意施作竟不意同上可恨汝還當思更就理一昨一本合二字作所字逰悉誰同故數往虎丘不此甚蕭索祖希時面因行藥欲數處按此行下空不能容看字故提頭耳看過還復共集散耳淳化拖筆不過三寸大觀乃至七寸不見奴粗悉書云見左軍彌數論聽故也今欲歸復何適報之遣不知總散往並上二字劉施釋闕按書法當作往並侍郎耶言别事有及過謝憂有飛白勤二月八日復得鄱陽等多時不耳為慰如何平安等人當與行不足不過彼與消息米云前五帖並張旭書八月九日芝白府君足下不為劉作所為陳作不日施疑按字形當作不為秋涼平善廣間劉施作深非彌邁想思無違前一作奈非比得書不逐一作遂非西行望逺懸想何日不勤捐庭堅作指棄劉作業非漂庭堅作湮沒不當行李又去春送舉一作余非喪到􅭑一作美陽須待伴比故遂蕳絶有緣復相聞餐食自愛張芝幸甚幸甚後漢崔子玊書伯思云崔子玊書云數附書知聞以解其憂唐人書也字亦非漢案孫云伯英嘗云吾上方崔杜不足下比羅趙有餘則敘崔當在張前大觀帖敘在張後賢女委頓積日治此為憂懸憔心今已極佳足下勿復憂念有信來數附書知聞以解其憂米云偽魏鍾繇書伯思云尚書宣示帖鍾書真迹本在王丞相導家導過江時藏衣帶中以遺逸少逸少以遺王修修死其母以修平日所寶並入棺真迹遂絶此本右軍所臨者白騎遂帖乃王大令臨唐開元中在滑臺人家并逸少臨宣示帖藏之故誤録在鍾部長風帖乃逸少早年書殊云變鍾體故亦誤置此長風范母齊梁人書非也尚書宣示孫權所求詔令所報所以博示逯孫云音録人姓案韻會音代及也古作逯又賄霽韻鍾繇力命帖有復蒙逯及語正同于卿佐必冀良方出於阿是茤芻同蕘之言可擇郎廟況繇始以疏賤得為前恩橫所􅀈一作眄又盼同睨公私見異愛同骨肉殊遇厚寵以至今日再世榮策通名按諸本皆作榮名法帖譜係云黔江帖榮名作榮石正與戲魚堂帖同同國休戚敢不自量竊致愚慮仍曰逹晨坐以待旦退思鄙淺聖意所棄則又割意不敢獻聞深念天下今為已平權之委質外震神武度其大觀帖度其右邊有臣張長吉張仲文小字拳拳無有二計髙尚自疏況未見信今推欵誠欲求見信實懷不自信之心亦宜待之以信而當護其未自信也其所求者不可不許許之而反不必可與求之而不許勢必自絶許而不與其曲在已里語曰何以罰與以奪何以怒許不與思省所示報權疏曲折得宜宜神聖之慮非今臣下所能有增益昔與文若荀彧字也奉事先帝事有數者有似於此粗表二事以為今者事勢尚當有所依違願君思省若以在所慮可不須復貌節度唯君恐不可采故不自拜表繇白昨疏還示知憂虞復深遂積疾苦何乃爾耶蓋張樂於洞庭之野鳥值而髙翔魚聞而深潛豈絲磬之響雲英之奏非耶此所愛有殊所樂乃異若能審已而恕物則常無所結滯矣鍾繇白白騎遂內書不俟車駕計吳人權道情懷急切當以時月待取伏罪之言蓋不以疑相府小緣心吞若八九大觀即接下帖弟常患常羸頓遇寒進口物多少有飛白新婦動止仰人十二日繇白雪寒想勝常得張侯書賢從帷帳之悼甚哀傷不可言疾患自宜量力不復具繇白得長風書靈柩幽隔三十年心想平昔痛慕崩絶豈可居處抽裂不能自勝謝書已上二字閣本微闕已乞施作具日安厝即其情事長畢奈何松等隕動哀情頓泄亦難可言郗還未卜聊示友中郎相憂不去心感遠懷近增傷惋每見范母子哀號使人情悲米云齊梁人書吳青州刺史皇象書伯思云皇象文武帖蓋寫漢東觀校書郎中髙彪送幽州督軍御史第五永針耳結字亦古史本云呂尚七十此云師尚七十史本云明其果毅此云昭其果毅師作吕昭作明蓋作史者避晉諱五將三門下當云地有九變丘陵山川人有計策六奇五間總兹三事謀則咨詢無曰已能務在求賢淮陰之勇廣野是尊周公大聖石碏純臣以威克愛以義滅親勿謂時險不正其身勿謂無人莫識已真忘富遺貴福祿乃存枉道依合復無所觀先公髙節越可永遵佩藏斯戒以厲終身時蔡雍輩並賦詩送永獨彪作此針雍等甚美之以為莫尚也全章見東漢書此段軼之象書人間殊少惟建業有吳時張天發神讖碑若篆若𨽻字勢雄偉相傳乃象書也懷瓘目以沉著痛快真得其筆勢云皇象後章草一表蓋唐人偽作其體正與世傳曹植書鷂雀賦同皆非真迹至若孫皓上晉武帝表亦章草書字畫髙古與此有間矣文武將隊一作墜乃俾俊臣整我皇綱董此不虔古史有之字君子即戎是劉施俱作從身昭史作明其果毅尚其桓桓師尚史作呂避晉諱也七十氣冠三軍詩人作歌如鷹如鸇天有泰一五將三門地臣象言頑暗容庭堅作空薄庭堅作蕩非加以年老凡百乖庭堅作朽者長沙傳摹失真也穢無所中庭堅作中一作聞宜特蒙哀傷庭堅作侍是殊異之遇安感騎乘之歡逰息之燕淳和足使忘軀庭堅誤作儉命疑作欲榮庭堅誤作裏觀足以光心膂延望翹翹念在效報而蕭走垂須終何才力潘本右有綻文以答新恩唯尚有借近趙走文過首施作省非貧尚尋天恩智方當私成無往顔愛自彌文唯米云此帖章帝一手偽帖晉丞相張華書得書為慰僕諸惛疾已甚已甚二字施作欲字暫西臥歸還乃悉比將念可疑反施作及非不具張華呈施作呈字疑一作頓首晉丞相桓溫書大事之日㒒在都謂無所復見慰勞又計時事也逐節郎來已具言意餘所淳化摹誤大觀摹正慰勞諸都督按上二字當作都督二字劉釋作相具答大觀摹正相具答三字施釋又與劉同邊將粗當爾耳㒒無所使當作護酒席劉作治度意晉丞相王導書文本標目板有朽壞晉丞相三字糢糊不全省示一作不具卿辛酸之至庭堅作言一作意吾甚劉與施同作案書法當慮憂勞卿此事亦不暫忘庭堅作忌非然書足下所欲致身處尚在彀劉作彀形稍近庭堅作殿義亦通一作殷大觀竟摹作冦故施以劉釋為非中王制正自欲不得許卿當如何導亦天明往導白改朔淳化摹可疑大觀摹正情增傷大觀摹正立人感濕蒸一作惡非自一作日何如頗小覺大觀摹正覺字損不帖有應不懸耿連哀勞滿悶不具王導施釋導字下多一白字晉丞相王敦書敦頓首頓首蠟節忽潘本右有綻紋過歲暮感悼傷悲意施分作今邑想自如常比苦腰痛憒憒心亂也一作快快得示知意反不以悉王敦頓首頓首晉中書令王洽書洽白辱告承陳與義曰此字畫失問洽故爾劣劣冀以復敘還日一作白不具王洽再拜洽頓首言不孝禍深備劉作紛按書法可疑施作豫其釋注云劉修撰無言以館閣法書刻於私家有此帖乃側注豫字恐是後人署名而淳化大觀帖摹以入行鈎勒復差蓋不可辨劉氏本豫字甚明也嬰荼毒蔭恃亡兄仁愛之訓冀終百年永有憑奉何圖慈兄一旦背棄悲號哀摧肝心如抽痛毒煩冤不自堪忍酷當奈何痛當奈何重告惻至感增斷絶執筆哽涕不知所言洽頓首言洽頓首言兄子號毁不可忍視撫之摧心發言哽慟當復奈何洽頓首言洽白向感塞不成敘得告承大觀摹正承字問殊乏劣白不具王洽再拜晉司徒王珉書伯思云王小令此年帖本唐人所畜與二鍾虞松三帖為一卷珉帖末云輔國司馬君筆勢婉雅與此有間矣此亦無後五字潘本此下有錠紋珉頓首頓首此年本文補䀶右貫標目垂竟大觀少末一鈎悲懷兼割不自勝奈何奈何寒切體中比何似甚耿耿僕疾遂不差眠食少憂深遣書不次王珉頓首頓首十八日珉白比劉作以二書暫至未更近問懸情不適以可不吾羸疾故爾憂深力書不具施作乙乙王珉敬問何如僕故頓弊力書不次王珉頓首頓首上下何如㒒上下上下大都蒙恩得書至之吾亦今欲出耳吾此月急遣庭堅作亟盡草四是王濟祖日欲必赴卿可剋過明庭堅作則劉作的吾大觀多一早字當下解相待餐按書法當作限出上四字庭堅作想你臨書非亦遣報既至王家一作敬非畢卿可豫檄庭堅作報謂傷筆非也光公令作一頓美食可投其飯也王珉相報晉司徒王珣書三月四日珣頓首末冬衆感得七月書知問即日一本無日字何如服一作秋字弊憂之劣不具施作乙乙王珣頓首白晉侍中王廙書伯思云王世將草四日帖與弟一卷數朝等偽帖字勢無異惟後兩表極古信能傳鍾氏筆意而右軍學之也表中有云頓乏勿勿案顔氏家訓云世中書翰多稱勿勿相承如此莫原其由或有妄言此忽忽之殘闕耳説文勿者州里所建之旗蓋以趣民事故匆遽者稱勿勿僕謂顔氏以説文證此字為長而今世流俗又妄於勿勿字中斜益一點讀為勿字彌失真矣案祭義云勿勿諸其欲其饗之也注勿勿猶勉勉也慤愛之貌杜牧之詩浮生長勿勿是知勿勿出於祭義古人詩中用之不特稱於書翰耳草四日廙白唯久白想適妙來行未面遲想得示知因施作同云冀何生相見近及不多王廙白米云同章帝一手偽臣廙言臣祥除以復五日窮思永逺肝心寸截甘雪應時嚴寒奉被手詔伏承聖體御膳勝常以慰下情臣故患胸滿氣上頓乏勿勿慈恩垂愍每見慰問感戴屛營不勝䘖遇謹表陳聞臣廙誠惶頓首頓首死罪死罪臣廙言昨表不宣奉賜手詔伏承聖體勝常以慰下情不審夙昔復何如承鄭夫人乃爾委頓今復增損伏惟哀亡愍存益勞聖心謹附承動靜臣廙言七月十三日告籍之等可疑近日遣王秋書不言一作具一作乙俱非月側一作何復半念汝獨一作緬思不可堪居奈何奈何雨涼不差施作審當作佳字大觀連下為一帖嫂干祿字書嫂嫂嫂上俗中通下正又禮記三老五更蔡雍曰更當作叟其來亦舊矣何如汝所患遂差未懸心不可言阿母蒙恩上下悉佳宜一作聞可行闕劉施闕一作鴻疑作㵼疾如復斷要取未斷愁人宜復具一作乙乙日發與别惘惘不可言今遣使未北反大觀摹作及書不足白復會一作言日消息廙疏晉太宰髙平郗鑒書鑒頓首頓首災禍無常奄承遘難念孝性攀凡偏旁手亦作于慕兼剝不可堪勝奈何奈何望逺未緣敘苦以增酸楚鑒頓首晉侍中郗愔書九月七日愔報比得章知弟漸佳至慶想令一作今漸大觀書法少二點勝食進一作逢不新差難將適猶懸憂遣不具施作乙乙愔報草四日愔報比書想悉達一作連一作違日諒弟佳不及數字愔報逺近何也劉施闕一作地非王右軍竟去不付石首干古乾字一節想親親當作乙乙悉如常敬豫王恬字何當長沙帖分作少用二字且分作兩行誤甚矣來耶道祖故未善一作曾非差恆在尚書不見來多日晉中書郎郤超書超言逺近無他説荀一作苟異問者定虛耳云段龕歸順不知審不不否通後凡遇此可以意求王江州羲之凝之皆嘗為江州刺史為宗正似已定前所傳者虛妄耳異同自旨啓超言晉尚書令衛瓘書頓按頓字下當有首字古人作字略希即可當字孔琳之帖尾頓首亦如此寫又羲之帖亦如此寫州民衛瓘惶恐死罪中闕音敬望想想一作報懷在外纍年始爾得還情甚踊躍旦當作且望當作至卅里上領當作須節度明日乃入奉説欣承福祚自當作得白不具瓘惶恐死罪施釋重死罪二字晉黃門郎衛恆書一日文本上二字板朽糢糊有恨知問未面為歎欲七日云一作之耶文本上四字板朽糢糊恆白晉太傳陳郡謝安書伯思云謝安後一帖傳摹逺甚米以為偽者蓋以惶恐再拜當時罕用然於尊老者或有之陶華陽真誥中有帖云許玄惶恐再拜正晉世體安頓首頓首每念君一旦知泉本此行有石斷紋窮煩寃號慕觸事崩踊尋繹荼毒豈可為心奈何奈何臨書悽悶安頓首頓首六月草日具記道民稱道民庭堅謂蓋事五斗米道考史王氏世事五斗米道凝之彌篤未聞安石恐當時通俗尚之案後漢張燕輩託天師道陵立祭酒治病使人出米五斗而病隨愈謂之五斗米道安惶恐言此月向終惟祥變在近號慕崩慟煩寃深酷不可居處比奉十七十八日二告承故不知甚馳灼太熱尊體復何如謹白記不具謝安惶恐再拜米云前帖真後六月帖偽書晉散騎常侍謝万書七月十日万告朗等詔朗川並早卒便流火感傷兼切不自勝奈泉本此行有斷石紋何奈何轉涼汝等各可可大觀第二可摹作之知近聞邑邑吾涉道動下疹乏少力力及不具施作乙乙告父疏法帖釋文考異卷二
