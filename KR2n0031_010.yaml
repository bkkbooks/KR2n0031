  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0031_WYG_010-1a, image: WYG0683/WYG0683-0411a.png}
body:
  text: 法帖釋文考異卷十明顧從義撰王獻之書吾當託桓江州助汝吾此不辨得遣人船迎汝當具東攻劉施作改疑是歸頭字枋三四吾小可者黃諫作去當自力無湖陳云蕪湖地名劉作無御黃諌作仰皆非迎汝故可得五六十人小枋黃諌作楊非以上文桓江州字攻枋字玩之當作枋字文彭云枋字疑借作船舫之舫諸謝當有二便是見今當語之大理盡此信還具施作乙乙白陳作自非胛痛可堪而以一作比作書絶欲不可識首當有知汝云云數十字見法書要録且作逸少書伯思云吾當託桓江州助汝帖米以為張長史書雖未必然要非大令書也案此帖不至惡但縱任近俗無晉世清韻真非大令書但殊不知亦寫右軍帖詞耳張彥逺右軍帖録有此語此卷亡其半上略云知汝欲來下云云凡九十字其中云上方大枋想汝不過數枋足人方足不果爾可白吾當託桓江州助汝王又云續帖逸少部中有前段結字殊應模矩蓋氏子弟臨逸少書勝此逺矣疾不退潛處當日深豈可以常理待之此豈二字各重一點常又重一點黃諌釋憂字案筆法當作急急不審食復何如大觀帖有云字淳化諸本無肌色可可所堪轉勝復以此慰馳竦劉作疏非潘本有補痕顧本竦右有裂未補竦左有補䀶耳語同六卷伯思云疾不退至分張帖諸大草字語類江表人消息亦不可不恆精以經心向秋冷潘本右有錠紋有補䀶右貫三行顧本有補䀶無錠紋疾下亦應防也獻之下斷來恆患頭項施作頭項當作溫頭痛復小爾耳省前書故有集聚意當能果不足下小大佳不聞官前逼遣足下甚急想以相體恕耳足下兄子以至廣州有飛白耶當有得集理不念懸心也耳近與鐵石蘇軾云是殷鐵石共書令致之想久達不得君問以復經月懸情豈可潘本可右有錠紋有補䀶顧本有裂未補未錠言頃黃諌作須更寒不適頗有時氣君頃一作須各可耳遲旨問僕大都小佳然疾根聚在右髀腳重痛不得轉動左腳又腫疾候極是不佳幸食眠意事為復可可冀非按書法當是章草狀字與四卷禇帖狀字同臧劉與施作藏非病耳知鐵石前往快作樂諸君善處世一施無一字達於當年不復過此僕端坐將百日為尸黃諫誤作卩居解日耳不知那疑作邦得一散懷何其相思之修內司闕此行深臨書意塞元度何來遲深令劉作足非人憂懸耶當謂有理因祠監多感大觀帖多共字足下事甚善然所造極難想足下每思先後公黃諫作卿豈須言親親不已意耳安石停此過半日黃諫作已非猶得一宿何物喻疑作􅈱之一十二字當作早字當浦送黃諫作道近施作迎道所以致歎黃諫作大觀以淳化誤摹何物一行在前送近一行在後改正陽諸懷兒不可言且不復得卿送有諸歎黃諌作今此貪黃諫作奕字亦通上道伯思云元度何來遲亦似逸少語其字皆張長史藏真輩偽作或自書二王帖語耳與第二卷知汝殊愁及藏真長史部中諸帖一手也忽動小行多畫庭堅作畫以為筆誤成十劉誤作書夜十三四起所去多又風不差腳更腫轉欲書疏自不可己唯絶歎於人理耳二妹復平平昨來山下差靜岐當還委泉本摹有誤曲前書具想案筆法作於字勝常也諸人悉何如承冠軍定入計今向達都汝奉見欣慶但恐停日不多耳米云已上八帖皆唐人書慶等已至也鵝差不甚懸心冝道尋去奴定西諸分張少言新婦服地黃湯來似減眠食尚未佳憂懸不去心君等前所論事想必及謝生未還可爾進退不可解吾當書問也鴨頭丸故不佳明當必集當與君相見不審阿姨所患得差否極令懸惻想東陽諸妹當復平安不審頃者情事漸差耶彼郡今載甚不能佳不知早晚至當遂至郡深想望豹劉作斁非奴此月唯省一書亦不足文本口內糢糊慰懷深悉足下情素耳伯思云豹奴桓嗣也王氏甥故二王帖中時及之如云豹奴晚歸家之類然此豹奴此月帖亦後人依放七月二日獻之潘本右有錠紋有補䀶左貫一行文本顧本有裂紋未補未錠白孫權據有江東以厯三世國險而民附賢能為用斯可與為援而不可圖也益州天府之地高祖因之以成帝業荆州北據漢河利盡一作逮南海西連帖作武巴蜀東通吳會此用武帖作連之國而其不能治天所以資將軍將軍既是帝室之胄信義著於四海來之大國誠難至也伯思云七月二日獻之白七字人偽作也下章草云孫權據有江東以厯三世亦蜀志中語與第五卷章草不可爭鋒也語相接字雖大小異乃一人書語已見本章此段世字闕中畫蓋唐人臨摹時去之以避諱猶今集法帖時殷敬二字多省其波也但東連吳會與用武之國連武二字章草體差相亂摹謬互置之鄱陽書停諸舍便有月未具散騎書知情至草草未發遣奉去月問承婦等復不能差深憂慮耳獻之白不審疾得損未極憂及更能出入未前書云至於散情嫂疾苦療得所深喜慰想必為問敬和王洽字晚際似差耶諸舍也能向諸弟各也獻之白極熱敬大觀闕波惟府君此月內得書來時幾得問希此消息極悶悶軍中復知何患濃不能潰意甚無賴君有好藥必時復與府中多少極濟事耶伯思云極熱敬惟府君帖云來時幾得問希此消息極悶悶又云意甚無賴君有好藥云云極濟事耶又服油帖云不至絶艱辛也皆近世俗言字勢亦不至佳非王氏帖明甚承冠軍故爾不覺轉勝灸無所覺憂馳深汝憔悚可言重第九卷大觀無此帖米云此帖偽服油得力更能停噉麵只五六日停也不至絶艱辛也足下明當必果想即日如何深想憶近奉阿姑告知一作欲非平安極慰人意獻之遂不堪暑氣力恆惙恐是惡風大都將息近似小却白承舍內分遣案書法作連近豫遂就難以喻痛濟理獻之白復面悲積蕃首以不佳耿耿僕近動散委頓雖轉折猶惙然發止綘帖作心尚以未定日冀以言首一作百非一作居力還不復耳施作乙乙當作具字伯思云復面悲積宋齊人書還此今有書何以至不知諸舍故多患念勞以今差也得領軍書故在風丹楊書常疾動耿耿亦足施作云一作之得鄱陽近書為慰丹楊疾者施作苦非不果來甚悵恨得西問不冦劉作寢非復云何令人邑邑具示獻之言月終伏惟哀傷不可任不審尊體諸患復何如悚息謹言疏不備獻之言米云已上三帖皆偽東家尚未欲下李參軍無政日有此議能自來此方寸無使聞上極不妙之事獻之頓首八月十九日具疏操之獻之再拜昨日諸願悉達奉奉告慰馳心極冷一作洽不審尊體復何如操之創故不差常惡亦案惡亦字當是念公字故爾憒憒陳作快快潘本憒憒右有錠紋有補痕顧本有小裂未下錠獻之昨來復下如欲作帶殊乏案乏字疑作口極服石的泉夲的字包中作一點潘本顧本的字包中無點丸潘夲丸右有錠紋有補痕右貫帶字顧本有裂紋未補未錠冀得案得字當作之字力謹謹下謹當作白不具操之等再拜獻之白不審尊體復何如昨夜眠多少願盡寬喻理憂馳可復言若得消息者一作告一作去獻之米云羊欣書嫂等承更惡不審頃痊復不必須散時終得力耶此藥甚佳想姊舉體不能行履服遂差安西且無恙府君屬有和稀久滯行路同人絶得此心故當攜其長幼諸汝上下知彼駱驛有書示不足以慰吾意耶冬潘本冬間右有錠紋有補䀶顧本未錠間必欲至足下所居承使君明練不謂漸有勝也君數劉作散非集聚然其大都可可吾止於月半間耶伯思云嫂等帖亦王氏書非大令鄱陽歸鄉承修東轉有理吾賢畢欲事必俟勝歡慰于懷耶吾終權冝至承今年飢饉仰惟年支都乏絶不謂乖又至于此耶吾腳尚未差極憂也米云羊欣書案帖重五卷獻之等再拜不審海鹽施作監諸舍上下動靜比復常憂之姊告無他事崇閣本摹有誤大觀改正虛劉道士鵝羣並復歸也獻之等當疑作常須向彼謝之獻之等再拜宋云偽帖伯思云鵝羣帖前輩謂此墨帖乃大令真筆僕觀此書殊不惡但怒張狂徑無晉諸賢韻味而前輩乃云此帖筆勢險逺如從空中數丈外擲下恐是真筆此非僕之所敢知也又此帖詞云崇虗劉道士鵝羣並復歸也獻之等須向彼謝之亦非當時尺牘體蓋以大令父逸少嘗書道德經換鵝而山陰曇􅙓村道士舉羣贈之故以此事傅會作是帖耳案崇虛館乃宋明帝泰始四年建子敬晉人相去亡慮五十餘年何得已稱之其偽可無疑又案魏收釋老志太和十五年詔立道家寺宇於枽乾之陰名崇虛寺去晉愈逺矣豫前所校量諸書詎敢自謂竟理要非臆決目論蓋書雖小道亦六藝之一能之既艱知亦匪易然天下理當為天下士言之真賞難遇豈獨論書哉敬祖王導子武岡侯協也日夕還山陰與嚴使知唐摹一本作君聞頗多歲月今屬天寒擬適逺為當奈何奈何爾豈不令念姊逺路不能追求耳重五卷淳化三年壬辰歲十一月四日奉聖旨模勒上石每卷後有此篆字三行法帖釋文考異卷十
