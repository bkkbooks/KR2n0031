body:
  text: 法帖釋文考異卷四明顧從義撰梁尚書王筠書大觀置四卷第四筠和南至節過念哀慕深至情不可任寒凝道體何如想比清豫弟子羸勞每惡惙弊何理大觀摹作俚眷請勤御比日來叙遣白王案書法作至筠和南梁特進沈約書大觀置第五今年殆差劉施作約垂故爾二字劉施闕始得此泉本此行有石斷紋事至二字劉施闕沈約白一作行十一月十六日梁交州刺史阮研書大觀置四卷第六道增至得書潘本得書甚勿未因中有補㾗直貫刺字刺字左有錠紋顧本未下錠深慰已熱卿何如吾甚勿勿始大觀失摹女字内一㸃過嶠今便下水未因見卿為歎善自愛潘本上三字左有錠紋異日當至上京有因道增行所有劉施作具少字不具施作乙乙阮硏頓首大觀帖有四月一日四字米云同章帝偽梁征南將軍蕭礭書伯思云齊豫章王凝孫礭子範之子在梁位司徒右長史此云征南將軍不知何㨿恐是梁邵陵王綸之子確也其書孝經一章亦近世偽體非江左書阮硏帖亦然為孫云一作確梁邵陵王綸之子也史謂工楷𨽻秘書丞若作齊豫章王孫位至司徒右長史俱不曾為征南將軍大觀作梁廣州刺史蕭確置四卷第七故以孝事君則忠以敬事長則順忠順不失以事其上然後能保其禄位而守其祭祀蓋士之孝也詩云夙興夜寐無沗爾所生米云同章帝偽梁蕭思話書宋征西將軍大觀作宋征西將軍蕭思話置四卷第三一月三日思話自節近説寒切足下復何如比何一涉道久當諸惡耶少首二字疑望近吾所患猶爾思話白梁蕭子雲書伯思云蕭子雲有章草史孝山出師頌一章甚古雅與此卷正書列子逺矣紙中王濛筆下徐偃信篤論也按史位至國子祭酒大觀作梁侍中蕭子雲置四卷第八舜問乎丞曰道可得而有乎曰汝身非汝有汝何得有夫道舜曰吾身非潘本吾身非左有錠紋顧本未下錠吾有孰有之哉曰是天地之委形也生非汝有是天地之委和也性命非汝有是天地之委順也孫子非汝有是天地之委蛻也故行不知所往處潘本知所往處右有錠紋顧本有補㾗未錠不知所持食不知所以天地强陽氣也又胡可得而有耶齊之國氏大富宋之向氏大貧自宋之齊請其術國氏告之曰吾善為盜始吾為盜也一年而給二年而足三年大壤自此以往施及州閭向氏大喜喻其為盜之言而不喻其為盜之道遂踰垣鑿室手自所及亡不探也未及時以臧列子作贓獲罪沒其光居之財向氏以國氏之謬已也往而怨之國氏曰若為盜若何向氏言其狀國氏曰嘻若失為盜之道至此乎今將告若矣吾聞天有時地有利吾盜天地之時利雲雨之滂潤山澤之産育以生吾禾殖吾稼築吾垣建吾舍吾陸盜禽獸水盜魚鱉亡非盜也夫禾稼土木禽獸皆天之所生豈吾之所有然吾盜天而亡殃夫金玊珍寶榖帛財貨人之所聚豈天之所與若盜之而獲罪孰怨哉向氏大惑以為國氏之重冈已過東郭先生問焉東郭先生曰若一身庸非盜乎盜陰陽之和以成若生載若形況外物而非盜乎誠然天地萬物不相離也仞而有之皆惑也國氏之盜公道也故亡殃若之盜私心也故得罪有公私者亦盜也亡公私者亦盜也公公私私天地之德知天地之德孰為盜耶孰為不盜耶或謂子列子曰子奚貴虛列子曰虛者無貴也子列子曰非其名也莫如靜莫如虛靜也虛也得其居矣取也與也失其所也事之破䃣而後有舞仁義者弗能復也陳朝陳逵書伯思云陳逵者晉西中郎將也此云陳朝陳逵誤矣大觀作晉中郎將陳逵置四卷第一十二月廿五日逵百劉施作白歲終感慘寒切足下何如遣不悉陳逵伯禮啟明顧問訙陳云與訊同足一作兄前許借介劉闕施作介斺之省也纛今遣一作進請受願付今劉施闕使劉施作佳仰干悚息謹啟中書令褚遂良書伯思云褚河南潭府帖末云舅遂良報薛八侍中前外舅張知常以為河南謫潭時無有薛姓為侍中者㒒嘗攷之信然按遂良以髙宗永徽六年貶潭州都督前此上至神堯時為侍中者裴矩齊王元吉杜如晦王珪魏元成楊師道劉洎張行成髙季輔宇文節韓瑗凡十一人未有薛姓者至儀鳳中薛元超始作相既在遂良後又不作侍中當時在外鎮未有兼此官者及觀字勢亦斆褚作嫵媚態其偽必矣後家姪至一帖乃眞河南得意書翩翩有逸敬體以前帖視之如蒹葭倚瑶林也按題上失唐字大觀作唐中書令置四卷第十潭府下濕不可多時潘本顧本日傍内闕一㸃深益憒顇況兼年暮諸何足言按筆法當作去意疾患有增醫療無損朽草枯木安可嗟乎自離王畿親故阻越每思宿曩寧喻於心承汝立行可謩出言成軌遷居要職擢任雄臺聞之嘉聲增以羡慕更得汝狀一作兆十卷大令鐵石帖内狀字同吾誠因奏事閒方便在意徒居此土深成要佳汝悉也五月八日舅遂良報薛八侍中前山河阻絶星霜變移傷揺落之飄零感依依之柳塞煙霞桂月獨旅無歸折木葉以安心採薇蕪而長性魚龍起沒人何異知者哉褚遂良述伯思云山河帖乃褚河南所書枯樹賦中鈔出耳此庾子山作而褚書之後褚遂良述四字後人妄益案此帖内星安性者哉字不知何處集成者家姪至承法師道體安居深以為慰耳復聞久棄塵滓與彌勒同龕一食清齋六時禪誦得果以來將無退轉也奉别􅀈倐同一誤作獯是獯鬻之獯字矣爾踰卅載即日遂良鬚鬢盡白兼復近歲之間嬰兹草土䴏雀之志觸緒生悲且以即日蒙恩驅使盡生報國塗路近止無由束帶西眺於邑悲冈更深因姪還州慘塞不次孤子褚遂良頓首和南唐秘書少監虞世南書伯思云虞永興大運帖歐陽率更比年帖皆集二公碑中字為之大觀作唐祕書監虞世南置四卷第九世南聞大運不測天地兩平風俗相承帝基能厚道清三百鴻業六超君壽九宵命周成筭𤣥大觀諱末一㸃無之道自古興明世南此下修内司闕世南從去月廿七八率一作牽一兩日一上二字合作曹行左腳更痛遂不朝會至今未好亦得時向本省猶不入内冀少日望耳施作可自力脫􅑙訪問願為奉答虞世南咨賢兄處見臨樂毅論便是青過於藍欣忭無已數願一作記學陳云與第六卷王羲之帖中熙字下一字筆畫相書似而次莊釋作孝字故知此亦未必是學字也案法頭上作交又與六卷存亡字不同當作學耳世南近臂痛廢書不堪覼縷覼縷委曲也覼覶通力和切也虞世南呈十三日遣書謹空得書為慰可言也米云臨樂毅論帖俗人偽作疲朽未有東顧之期唯增慨嘆今因使人指申代面必公力也此字有飛白潘本力也之間有小補㾗右有錠紋顧本有補㾗未下錠鄭長官致問極眞而其三人恒不蕩蕩將如何故承後時有所異責潘六云司未得近問莫耶數小奴等計不日當有狀來唐率更令歐陽詢書大觀置四卷第十一貞觀六年仲夏中旬初偶諸蘭惹猥辱見示諸家書徧得㸔尋可以頓醒滯思各甚嘉妙今昔孰為比肩至於興歎耳珍重珍重因書此叙於其後渤海郡率更令歐陽詢記之靜而思之勝事莫復潘本莫復有補痕右有錠紋顧本有補痕而未下錠過此氣力弱猶未愈吾君何當至速付書必向饒定須施作願當作頃寄信意當作立具二字歐陽潘本陽字右有補痕及錠紋顧本俱無詢呈五月中得足下書知道體平安吾氣力尚未能平復極欲知君等信息比憂散散不可具言不復歐陽詢頓首頓首足下何當一作嘗定返還人望示心曲永嘉書處定難泉本此行有石斷紋以為其心也比年守疾病無事絶心氣至於書處焉並昔時既言必求然顯數字豈能備矣須將示之十五日歐陽詢米云比年帖俗人偽作吾自腳氣數發動竟未聽許此情何堪寄藥猶可得也唐諫議大夫柳公權書伯思云栁少師與弟帖末云誠懸呈人多疑之以顔籕注漢書丞相衡傳云字以表徳豈人所自稱栁不當稱字然嘗觀逸少敬謝帖自云王逸少白廬山逺公集盧循與逺書自云范陽盧子先叩頭則古人稱字蓋或有之大觀作唐太子太師栁公權置四卷第十七聖泉本此字闕石角慈允許守官稍减罪責潘本右有錠紋顧本有橫補痕未下錠猶深憂懼續冀面言不一一誠懸公權字與弟書故可以字也呈卅弟處十四日懸施作懸當作敬問二字伏審姊姊八月定發弟與卄八弟同從行逺聞不勝忭躍今日元七一作叔來望弟速到極也願在路咨聞不停滯幸甚未即展割尚增悢悢不一一公權呈廿三弟卄六弟卄八弟卅弟處卅一弟意不殊前要小楷後當作復使一作便非送往一作言奉榮示承已上潘本右有錠紋顧本有補未錠訖惟增慶悅下情但多欣愜垂情問以所要悚荷難任儻有赤箭時寄及三五兩以扶衰病便是厚惠不具公權狀白至十六日專到崇賢惟昭察謹狀十五日公權狀辱問却送及碑本兼虛奬逾涯但深反側因見趙張如虛奬之說為縁飾也幸甚不具公權呈唐李邕書大觀作祕書監李邕置第四卷第十五三數日晴頓熱若為自適也㒒少理欲使小兒入京當從澧州去有書不示之諸公潘本公當間有錠紋公字下有補痕顧本有補痕未錠歎賽無九百之事當不復爽也故使馳問不具李邕白十二日差無多事撿挍來一言集耳通長孫五郎慶厯帖有㪚騎二字唐諫議大夫褚庭誨書大觀置四卷第十四辭奉後不辱問實增馳係初寒惟動履休勝庭誨推前耳未由拜展悠悠下情惟珍厚人信惠問通法師往謹附狀不宣謹狀唐尚書郎薛稷書大觀作唐禮部尚書置四卷第十二孫權與介象論膾象以魚為上權曰此出海中安可得象乃庭中作塪置水投以鈎餌不經食得二字韻書不載二字一義恐通用也考三國志俱作鯔音兹魚付厨唐洺州刺史徐嶠之書大觀作廣平太守徐嶠之置四卷十六春首餘寒惟闍一作閲誤潘本有補痕左貫四行闍字左有錠紋顧本有補痕未錠梨動正安隱弟子虛乏謬承榮寄蒙恩奬擢授洺州一歲三遷自南徂北既近都邑忝竊彌深戰懼之情慙惶據便即大觀書法少變祇命未由頂謁瞻望山門但增悽斷願珍重忩忩不宣弟子徐嶠和南唐東宮長史陸柬之書伯思云陸柬之帖殊不類唐人語當是臨晉宋人帖不爾效其語作此耳大觀作唐朝散太夫陸東之置四卷第十三近得告為慰上下無恙恙不得呉興近問懸心得藥書散勢耿耿嘗也得耿耿也四字有飛白唐薄紹之書伯思云薄紹之宋世為丹陽尹書與羊欣齊名時號羊薄此卷目為唐人謬甚矣案薄字欽叙又字敬叔大觀作宋給事中薄紹之置四卷第二知弟定欲廻換潘本有補痕貫四行顧本同住止周旋一作同於非江叅軍甚施作得可疑一宅今㫖遣問之若必未得居宇多當成交關也但臨丹訪處自難稱意得消息㫖遣白薄紹之白徐嶠帖内正字按文義當作止字及觀汝帖幷古唐帖皆摹正作止字法帖釋文考異卷四
