body:
  text: 法帖釋文考異卷一明顧從義撰漢章帝書黃伯思刋誤云凡草書分波磔者名章草似此耆但謂之草猶古𨽻之生今正書故章草當在草書先然本無章名因漢建初中杜操伯度善此書章帝稱之故後世目焉今此卷首帖偶章草便以為章帝書誤矣然此書亦前代作但録書者集成千文中語耳米芾徑以此辯之未中其病黃庭堅云疑只是蕭子雲書之最得意者辰宿列張盈昃海鹹河淡鱗羽翔龍師火帝鳥官人皇始制文字乃服衣遐邇壹體㒺談彼短無恃已長尺璧非尚寸陰是競孝當竭力忠興温若思愼終宜令學優登仕攝職從政都邑二京背芒干禄字書芒邙上俗下正面洛浮渭既集墳典亦米云偽帖晉武帝書伯思云米云晉武當是孝武非也僕按省啟帖與後譙王帖雖在疑録似非一家書續帖中炎報帖頗與此筆法同炎晉武名非孝武也然皆後人依放此帖末云故遣信還古者謂使為信故逸少帖云信遂不取答眞誥云公至山下又遣一信見告謝宣城傳云荆州信去倚待陶隱居帖云明旦信還仍過取反凡言信者皆謂使人也近世猶有此語故虞永興帖云事已信人口具而今之流俗遂以遣書饋沕為信故謂之書信而謂前人之語亦然不復知魏晉以還所謂信者乃使之别名耳省啟知既下須防具具施作之揚州寒到有者比尚擬之動靜更啟也數遣信還米云偽帖西晉宣帝書伯思云阿史病轉差帖云晉宣帝亦未然按大觀帖叙在一卷第二不當在武帝下此類太多之白阿史病轉差差即瘥疾愈也後放此未皆外曹尚書云當作之得書法東晉元帝書伯思云安軍破堽數朝三草書筆勢糺繞若一其偽不疑僕㓜時嘗觀世傳七賢書末有白字皆連名作㸃七人所作了無小異雖當時筆法傳授或同然人書不同亦如面焉不應乃爾無别因疑其偽是時宿輩長者或謂不然後觀竇臮書賦始知七賢帖果李懷琳偽作此三帝草書亦是類也安軍未報平和之如何深可為事也八月九日睿頓首施宿大觀總釋文作頓首頓首忽中秋闕懷便微冷恒何如比殊不能佳惟勿得慰抱闕不多司馬睿頓首施作頓首頓首米云偽帖東晉明帝書伏想作一行墓次安隱隱穩古通用後放此守視文武平安東晉康帝書陸女郎問誶息醉切言也如此可籌量之有飛白東晉哀帝書丕死罪死罪承中書郎君疢患比委瘵情以灼恒伏念垂心憂勞想得治力漸佳丕死罪死罪東晉簡文帝書昱白所示慶賜事具具施作乙乙此莫大之禮施作祀天下大慶得率由舊章慰荅民望甚為盡善但奢則不適於時儉則陋而不典正當斟酌其宜令得㑹中耳文嘉本第二三行闕上二字第四行闕上三字第五行第六行俱闕上四字東晉文孝王書帖説既云道子白當是會稽王也異暑復何如向見􅂒云卿小苦瘧不乃以為患治之不文本已上二行各闕五字通前八半行皆白紙似闕損此方板也遣不悉司馬道子白東晉武帝書語見晉武按米黃二公見則譙王為襲封者矣晉武帝諱炎東晉孝武諱曜大觀帖為晉武帝次省啓帖下比劉次粧釋文作昨非得譙王名遜宣帝弟仕魏關内侯晉受禪封譙王書有欲仙語吾荅之如别卿前云宜卿譙王叅之於衆云公書卿私書君輙從衆以吾觀之寧當許也想所謂爾宋明帝書伯思云宋明帝帖云報休祜休範二家内人知祜晉平王也範桂陽王也宋史以祜為祐蓋册牘傳冩之訛當以祜為是按諸帖俱作祜豈帖反不足信耶鄭修容有兄喪今成服汝可令汝內人知之再報休祜休範二家内人知也彧明帝諱一作感非報齊髙帝書吾今至破堽在路粗可尋潘允諒本右有銀錠紋還遲見卿不逺願信知卿深意也米云偽梁武帝書數朝脚庭堅謂脚字㣲摹轉缺筆是評長沙帖也氣轉動不得多有憂懸情也二謝處委曲復當有情故舊數有書問不可復有興也知何時再言話報之米云偽梁髙帝書伯思云米云梁髙當是齊髙非也此帖末云蕭衍正梁武名梁武廟號髙祖此書目誤以祖為帝耳本按潘得袁褧之閣本顧從義所得螙損閣標目下有小二字衆軍行人最今封如别曹郢州曹景宗也近遣樊士眞領三百人猶在漁湖其應用行合應有四千人疑有闕此行特稀而短故指白蕭衍疏米云偽梁簡文帝書知康司馬卓以水淺未時發漢源冬涸理當有訜茟云切不知也遄舟有及具泉州本此二字闕角綱荅米云偽唐太宗書不審夜來胷氣何似想當漸散痢復斷未江叔所患竟不痊除奄然逝聞問悲痛哽咽何言想叔同氣之傷故當難處今故遣使往叅具施作乙乙無委諮諮字下大觀帖多二日二字伯思云弔江叔帖非唐文皇書案髙宗永隆元年七月丙申江王元祥薨即此帖所謂江叔也髙宗多以國呼諸父如滕叔不須賜謂滕王元嬰猶以元祥為江叔此正髙宗書也兩度得大内書不見奴表耶耶忌欲􅁪施作怕非死少時間忽得奴手書報娘子患憂惶一時頓解欲似死而更生今日已後但頭風發信文本有闕空未補便即報耶耶若少有疾患即一一具報今得遼東消息錄狀送憶奴欲死不知何計使還具耶耶勅懷讓患水邊身腫復利形勢極惡耶耶意多恐不濟潘本幷顧本俱闕齊上一㸃遺愛勞發大重氣候一作復非似少可於豆盧覆姓也亦似難差傷念不可言奴報其婦知也叔藝韞藴通一誤作輼多材慈深善誨藹夙奉趨庭之訓早擅臨池之工聞其比來復愛飛白昨故戱劉與施俱釋作遽非操翰墨聊以示藹本文故藹二行頭上木版朽壞殘闕不全慙六文之潘本有補㾗錠紋顧本有補㾗未下錠文本未補麗則異五際之芳詞忽枉來書談飾過實顧惟菲迹非敢當仁披攬循環祗以增愧故斯表意餘不多云諮諮字下大觀帖多十五日三字伯思云叔藝韞多材帖亦髙宗書中云聊以示藹謂魯王靈夔之子范陽王藹也靈夔亦髙宗叔史稱其篤學善草𨽻此帖所謂叔藝韞多材慈深善誨藹夙奉趨庭之訓早擅臨池之工者以此後有荅進枇杷幷移營五橋南二帖皆髙宗書此數段並誤入太宗帖中使至得所進枇杷子良深慰一作至非恱嘉菓珍味獨冠時新但川路既遥無勞更送今者梅炎藻夏麥氣迎秋香飄蘭坂之風鏡轉桂巖之月為善之暇想劉作相非足怡神延望白雲載深離緒聊疏緑一作縁非字此不多申諮諮字下大觀多廿九日三字使至辱書知公所苦少可慰意何言不知信復更復何似時氣潘本華叔陽本已上五字少有殘闕獨顧本不損漸冷善將息也所請景賢公即宜畱聽追然後遣若無好藥更遣揀擇今為北邊動靜奉勅即行相去一作知非大近信使非遥實情欣怉施作悦耳遣無疑是乏字李世民呈比者久嬰沈疾虛弊何言昨旦臨朝畧無勞惙㸔此稍望平復未知於後何如且用慰心自怡而已昨夜痛發少覺勞弊華本弊字行左有一卷二字所上有補㾗以不能相見若有事進勑十一日昨日來體履似漸可始聞卿不佳旦來何似勑三五日來漸望平復所以不能相見恐更勞發勑雅一作雍州只為造船急所以如此早與書莫聽急賊已至万一作一力發兵恐少勑卿與道宗誰已得多馬明當至故遣問即報勑十四日所疾者漸可不至憂耳此行獨低一字諸本皆同北邊始有華本行左有一卷十三字表至甚無事故書相報勅八柱承天乾道由其廣運四維紀地坤元所以載安是知締搆經綸必具風雲之佐燮諧樞宇咸資川嶽下潘本華本顧本失波作下字淳熈脩內司帖有波作之字靈故軒丘御扆六相宣其景化媯水乘時五臣濟其鴻業數日來氣發今旦服一飲子不得相見有事進狀勑中書門下三一誤作六品廿七日門下中書省及侍郎給事中舍人員外郎鎧曹叅軍左右庶子大觀連下明日移營帖共作一帖明日移營向五橋南一二一合二字作三非里着勅三日數日來患痢今雖稍可猶自虛惙欲三五日將息諸司有事進狀勅十一日昨令今旦引髙麗人辭明日將來勅二日卿昨日道服蜀葵可録方將來勅廿三日唱箭處只道官號及姓不唱名不知是何人想彑應合唱名勅三日泉本此帖二行有石裂紋五言秋日斆庾信體嶺銜霄月桂珠穿曉露叢蟬啼覺樹冷螢火不温風花生圓菊蕋荷盡戱魚通晨浦鳴飛雁夕渚集栖鴻䬃䬃髙天吹氛澄下熾空數年來每有征動雖復事非為已猶恐下有怨咨所以廢甘泉之逰履燋金之弊寧可違凉忍暑不能適已勞民想汝誠心惟吾是念自非孝情深結孰能以此為懷省書澘然益增感念善泉本此行有石裂紋自將愛遣此不多哥哥勅東都今年别稅草今既不去並停常税草彼處應無用處且宜減納即早處分勿遲勅九日唐髙宗書太子無事欲僻洛城西門伏聽更不須覆奏勅廿三日過午將審行𢎞福及倉糧悵乏絶戸數向衙裏來勅廿五日上二字飛白卿及文瓘處俊敬𤣥午前到九乾門來勅廿九日錢事且莫宣出勅有飛白六尚書及尚書左右承侍郎殿中將作少府司農等長官今日晚間並喚向衙裏來勅至徳二日昨日令卿等平章事遣作狀報何因不進勅六日使至知𤣥堂已成得早了深以為慰不知諸作早晚總待斷手日月猶賖必須牢固數日來極熱卿等撿校大應疲倦陵初料髙一百一十尺今聞髙一百三十尺不知此事虛實今因使還故遣相問勅十五日今遣𢎞孝敬皇帝也往東都逐生氣敬𤣥已下宮臣及隊仗至彼聽入於文思章善等門祗承啟事進食等物並聽其文思門宿衛處卿等共其相知檢校勅更不湏覆奏廿六日陳長沙王陳叔懷書伯思云據陳史長沙王但有叔堅而無叔懷其晜亦無此名觀帖尾作名處疑是叔愼叔愼岳陽王也孫楨云蓋摹傳之變宣和書譜亦作叔懷謂史不載其名黃説為優云須􅀈吾既不司此行極是是字疑園中梅始發既無工力治未花之與􅀈今付此不多叔懷答自足何用此花潘華顧三本花字内多一晝泉本孫本無畫陳永陽王陳伯智書伯思云陳文帝謂宣帝曰我名子以伯汝宜以叔此卷陳永陽王伯智書誤録在長沙王叔懷後熱甚汝習讀為勞吾疾劣遣不具伯智疏寒嚴比氣力何似僕疾劣甚情想遇今信㫖此不多陳伯智疏法帖釋文考異卷一
