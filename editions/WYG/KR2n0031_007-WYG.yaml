body:
  text: 法帖釋文考異卷七明顧從義撰晉王羲之書七月一日羲之白忽然秋月但有感歎信反得去月七日書知足下故羸疾問庭堅辨作而字謂上失一㸃觸暑逺涉憂卿不可言吾故羸乏力不具施作乙乙王羲之白得闕九日書見桓公温也當陽去月九日書久當至闕遲可憂耳蔡公大觀摹正公字案謝安子琰字瑗度苻堅之役以闕蔡公遂委篤又加㿃下日數十行深可憂慮大觀摹失寫法得仁祖廿六日問疾更委篤深可憂當今人物𦕈然而艱疾若此令人短氣伯思云得都下九日帖中云蔡公者蔡謨也仁祖者謝尚也晉穆帝永和十二年秋桓公破姚襄至洛故此云久當至洛是時將以謝尚鎮司州以病止故此云得仁祖廿六日問病更委篤與陶榖家所畜逸少破羌帖中所書事正同其帖云知虞師云桓公以至洛即摧破羌賊賊重命想必禽之王畧始及舊都使人悲慨深此公威畧實著自當求之於古真可以戰使人歎息知仁祖小差此慰可言適范生書如其語無異故須後問爲定今以書示君僕嘗䟦之云晉穆帝永和十二年秋桓温破姚襄于伊水遂至洛時將以謝尚鎮之屬病不行所云桓公摧破𦍑賊及仁祖小差正當時事也是時逸少去㑹稽内史已歳餘方遯迹山水間宜不復以世務經懷而此書乃歎宣武之威畧悲舊都之始平憂國嗟時志猶未息惜其一憤逺引使才猷約結弗光於世獨區區遺翰見寶後人覽之深爲興歎此帖草法極工惜不載法帖間故附見案史琰封望蔡公不可只曰蔡公且仁祖是伯豈有伯稱字而姓稱爵之理乎蔡謨正與仁祖同時時人稱爲蔡公故時人曰蔡公過浮航脫帶腰舟長大觀接下帖作一帖謝光禄亦垂潘本垂左有錠紋有補㾗右貫短字顧本有補㾗無錠㾗命可憂念念一已上三字劉施合念二二字按書法二字上一畫筆勢不相連屬又一朝之義爲長故二畫當是重念字闕一字朝奄忽傷人懷今年彫落可闕深得書知足下故頓乏食差不耿耿吾故闕爲結力不具施作乙乙王羲之闕月半念足下窮思深至不可居忍雨濕體氣各何如參軍得針炙力不甚懸情當深寛割晴通省苦施作告遣不具王羲之白長素差不懸耿不大佳也得敬豫九日問故進退憂之深知念許君與足下意政政作正語見六卷同但今非致言地甚勅勅亦不知范生以居職未以卿示輒便及之吾尚不能惜小節目但一開無觧已又亦終無能爲益陳辨作蓋非適足爲煩瀆足下呼爾不每念長風不可居忍昨得其書既毁頓又復壯溫深可憂謝生多在山不復見且得書疾惡冷耿耿想數知問雖得還不能數可歎重第八卷後有不審比出云云二十字初月二日羲之頓首忽然今年感兼傷痛切心柰何奈何念君哀窮不已羲之皇恐皇恐施作呈耳一作皇皇伯思云自初月三日至前從洛帖皆僞如初月有云羲之闕使如然也願足下莫見責乃俗闕知心素致是著書觀其所補闕此正同字格韻與足下時事少可數來主劉施作至人相尋下官吏大觀作更施釋云是淳化誤摹作吏不東西未委若爲言叙一作欲乖足下不返重遣信往問願知心素吾恠足下參朝少晚不審有何事情致使如然也王羲之再拜前從洛至此未及就彼叅承願夫子勿悒悒矣當日緣明府此字疑共飲遂闕問願足下莫見責羲之頓首米云己上四帖僞十一月廿七日羲之報得十四十八日二書知問爲慰寒忉比各佳不念憂勞久懸情吾食至少劣劣力因謝司馬書不具施作乙乙羲之報十月七日羲之報前遇足下所得其書想殊有勞弊然叔一作七非兄一作見子孫有數人足慰目前情至取荅委曲故具示可令必達以副此志且山川甚有形勢逺想慨然又出藥精要有騐信次施作比一作須皆非何敢當大惠也從弟分别吾深憂慮卿女轗軻闕充喜言不多耳羲之伯思云十月七日帖米以爲集成闕帖亦然蓋二帖字意皆不相屬而君十七帖中足慰目前可令必達以副此闕平慨然等帖語厠其間如云足下尚停數日得告承長未佳足下小大佳也知比得丹陽書熱日更甚期已至旦反想至七帖皆後人依放中有云不易可得過夏知有患者早乗涼行皆非當時人語承足下還來一帖不論可見其僞皇象草章㫖信送之勿三當付良信逺婦疾猶爾其餘可耳今取潘本顧本此字損未有補書付想具施作乙乙阮生何如此粗平安數絶問爲慰羲之白君晚可不想比果力不具王羲之白得逺嘉興書計今日必度喜遲可言足下至慰今有書想足下有㫖信别告具之云大觀失上一㸃足下尚停數日半百餘里一誤作生當是武字半百餘武猶言五十餘步也瞻望不得一見卿此何可言足下疾苦晴便大熱淳化摹誤劉闕大觀改正作甚恒上二字庭堅辨作小舡非一作所恨中至不易可得過夏不甚憂卿還具示問得告承長平未佳善得適適君如常也知有患者耿耿念勞心食少勞甚頓還白不具王羲之再拜足下小闕也諸疾苦憂勞非一如何復得都下近問不闕敬和王洽字廿三日書無他重熙住定爲善謝二侯潘本顧本有補㾗張帖錄有謝二侯三字帖按此巻内有兩謝二侯詳見下文省潘本顧本省字下闕目字大觀與泉本省字全飛白乃致佳造次尋之乃欲窮本無論小進也稱此將青於藍顧本此帖内多模糊知比得丹楊縣名以其地多赤栁故曰丹楊書甚慰乖離之歎當復可言尋答其書足下反劉施同當作友事復行便爲索然良不可言此亦分耳遲面具施作乙乙太常故患胛有飛白灸俞體中可可耳有飛白僕射事已行以表讓未知恕不未復司州㫖告懸竦劉作諌非鄱陽歳使應有一合二字作膺書而未得向亦得万書委曲備半大觀摹作悉使人慨然見足下乃悉知叔虎尅昨發月半畧必至未見勞叅軍熱日更甚得書知足下不堪之同此無賴早旦劉作且乗涼行欲往遲散也王羲之知賢室委頓何以使爾甚助耿耿念勞心知得廿四問亦得叔虎廿二日書云大觀失末一筆新年乃得發安石昨必復潘本有小補㾗尅潘家欲剋廿五日也足下以一作比語張令未前所經由足下近如似欲見今送大觀併後一帖連作一帖七月六日羲之白多日不知問邑邑得二日書知足下比問劉陳施釋昨問案書法當作比門耿耿今已佳也期已至遲還具足下問耳當力東論一作詣道家無緣省苦施作告但有悲慨不得東此月問米云當力以下僞信云舍一誤作欲子别送乃是北方物也何以欲此欲幾許施釋云淳化誤連二帖作一帖二按許字下空半字宛然帖何得誤也致此四紙飛白以爲何似能學不大觀誤連上帖作一帖月末必往遲見君無以爲喻鄉里人擇藥有發劉施俱作簡字案革頭下多一㸃宛是夢字而得此藥者足下豈識之不乃云服之令人仙不知誰能試者形色故小異莫與施作有一作即一作可嘗見者謝二侯謝二侯别作一行與前後筆法不同故彦逺爲别係一帖是也昨劉施作昨案筆法當作所見君歡復劉作後無喻然未善悉想宿昔可耳脅中云何一善消息值一作德周轉勝也耿耿疾患小差與宏逺俱謁庭堅作臨一作治案書法與前期已至帖中東詣道詣字同遲共寫懷王羲之承足下還來以久早一作子欲叅慰爲染患不能得往問眷仰情深豈此委具一兩日少可尋潘本豈尋中有錠紋有補痕冀言展若因行李願存故舊今遇潘本李遇字中有錠紋有補痕賢弟還得數張紙勞動幸不恠耳謹此代申不具釋智永米云子敬書劉云此帖世多論爲差誤蓋太宗皇帝取其書類右軍遂參列其間所以貴之耳太宗於草聖最爲深妙何乃特不曉此釋智永耶愚以爲帖中錯亂甚多不特此耳要是王著失誤故秦少游有云當時奉詔集帖之人苟於書成不復更加研考斯言得之矣大觀帖置第五巻次智果帖下雪候既不已寒甚盛冬平可吾劉施俱作苦非患足下亦當不堪之轉復知問王羲之知庭堅作宏逺比當造次陳作須一作江非遲見此子真以日爲歳足下得審問㫖令吾宏逺王粹也出稽紹傳子含傳荀侯佳不未果就卿劉施作深案書法當作諄或淳字企懷耳安好音信那可遇施云疑作云里得歸洛也計令疑作介解有懸休尋米云僞帖伯思云荀侯帖云安好音信明公還得歸洛也詞筆皆如初月帖劉釋云安好音信那可遇得歸洛也信案筆法當作安西音那公里得歸洛也知君當有分住者念處窮毒而復分乖尚可居情想反一作友與前丹楊帖内友字同法理斷當旦反想至所苦晚差不耿耿脩内司闕此行僕脚中不堪沈陰重痛不可言不知何以治之憂深力不具施作乙乙王羲之頓首深以自慰理有火劉施作大案書法當作火斷其思豁之令盡足下勿乃憂之足下殊當憂吾故具施作乙乙示問伯思云深以自慰晚復毒熱二帖唐文皇所臨者羲之白耳帖不論可見其僞晚復毒熱想足下所苦並以佳猶耿耿吾至頓劣冀涼意散力知問王羲之頓首足下家極知無可將接爲雨遂乃不復更潘本復更中有斷紋錠紋顧本有裂紋未下錠諸弟兄問疾深䕶之不具大觀具下有玉字羲之白耳米云僞僕近修小園子殊佳致果雜藥深可致懷也儻因行往希見比二處動靜故故施作之黄諫作具常患馳情散騎㿈轉利慶慰施及黄諌作至非姊故諸惡及比一作側非永嘉至黄諫作慰謂二字顛倒非奉集欣憙無喻餘可耳得華直一作冝非疏故爾諸惡不差懸憂順何似一作以非未復慶等近消息懸心君並何爲耶此猶未得黄諌作行非盡集理行大尅遲此無喻米云僞帖伯思云僕近修小園子殊佳帖米以爲子敬書僕謂處動靜以下方是子敬筆前兩行乃唐人書字勢帖語與後逈殊大觀釋注云淳化本作慰大觀本作至未知孰是下有永嘉至字與慶至字寫法一同後又有慶等近消息此帖元章長睿皆謂非右軍帖乃子敬所作元章藏子敬十二月帖勒石寶晉齋亦有慶等字筆法正相類當是人名爾龍保等平安也謝之甚遲見之案十七帖無之字多卿舅可耳至爲簡隔也九字當是王著失摹離不可居叔當西耶遲知問案十七帖及大觀帖上有知足下行至呉會違八字今錯置在後第五帖知彼清晏歳豐施作無非又所使十七帖作出有無無鄉一作一謂一作無以故是名處且山川形勢乃爾何可以不逰目朱處仁今所在往得其書信遂不取荅今因足下荅其書可令必達伯思云朱處仁在十七帖間其中有云往得其書信遂不取荅謂昔嘗得其書而信人竟不取報書耳而世俗遂誤讀爲往得其書信殊不知信者乃使人也自連下語非若今之謂書信也第一篇晉武帖中已詳辨之按伯思此語見刋誤第六巻不得臨川問帖語相連屬想當時所見之帖此帖誤在六巻中故耳愛爲上一作退臨書但有惆悵十七帖上有吾服食云云廿一字知足下行至呉念違案書法當作連彼䀋井火井皆潘本井皆左有補痕有錠紋顧本有裂紋未下錠有不足下目見不爲欲廣異聞具示足下今年政正同見前知念帖七十耶知體氣常佳此大慶也想復懃加頥養吾年垂耳順推之人理得爾以爲厚幸但恐前路轉欲逼耳以爾要欲一逰目汶領嶺通案蘭亭崇山峻領亦作領字非復常言足下但當保䕶以俟此期勿謂虛言得果此緣一段奇事也法帖釋文考異巻七
