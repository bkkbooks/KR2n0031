body:
  text: 法帖釋文考異卷六明顧從義撰晉王羲之右軍將軍適得書知足下潘本知足下右有錠紋有補㾗顧本有補㾗無錠紋問吾欲中治甚憒憒一作快快向宅上靜佳眠都不知足下來一一作門非甚無意恨不蹔面王羲之伯思云自適得書至慰馳疎或作悚闕諸帖除穆松及秋中二帖差似逸少闕筆無晉韻又闕如不工書者僞作耳非特命等乃今流闕可辨之已闕期共至謝欲處云一作之非何欲行想忘耳過闕差涼君可不今日實顧不遲面力知問王羲之泉本此帖二行有斜裂紋比奉對對兄以庭堅作比釋豈一米云已上四帖僞汝不可言未潘本有補㾗知集聚日但有慨歎各慎護有飛白前與㛐試求屏風遂不得荅爲也有飛白奄至此禍情願不遂緬然永絶痛之深至情不能已況汝豈可勝任柰何柰何無由叙哀悲酸日月如馳㛐棄背再周去月穆松劉闕張彦逺二王帖錄作松大祥奉瞻廓然永惟悲摧情如切割汝亦増慕省疏酸感米云已上三帖真伯思云酸感至比加下及宰相并噉豆鼠伏想㛐等亦僞作蓋以逸少别帖垂三十年比加下㿃等語厠其間兄靈柩垂至永惟崩慕痛貫心潘本心左有錠紋右有補㾗顧本有補㾗未下錠膂痛當柰何計米云僞按日月如馳兄靈柩垂至淳化帖張彦逺帖録所載皆爲兩帖大觀連作一帖闕闕本此行下半行翳垂三十年而吾勿勿不知堪闕不發言哽絶當復柰何吾頃至勿勿比加闕闕小大問爲慰多分張念足下懸情武昌諸子亦多逺宦足下兼懷並數問不老婦頃疾篤救命恒憂慮餘粗平安知足下情至旦夕都邑動靜清和想足下使還具劉釋闕施作乙乙時州將桓公告慰情企足下數使命潘本顧本俱全泉本少一㸃十七帖諸本草法各各不同也謝無奕謝安兄桓温嘗辟爲安西司馬外任數書問無他仁祖謝尚字日往言尋悲酸如何可言米云已上三帖真㐲想二字作一行㛐安和自下悉佳松上下至乖隔十八年復得一集且悲且泉本此行後斷石三行慰何物施云劉作指誤陳作物喻㛐疾至篤憂懷甚深穆松難爲情地自至施作慰猶小差然故勿勿冀得涼漸利施作和耳米云此帖偽闕帖内篤字諸本皆糢糊其中闕諸從並數有問粗平安唯修載在逺音問不數懸情司州王胡之也疾篤不果西公私可恨足下所云皆闕無間然諸問想足下别具不復乙乙一作闕闕時見省甚爲簡濶劉闕一作理非逺須異多闕疾篤潘本顧本闕歇筆一㸃不得數爲歎耳米云已上二帖真宰相安和殷生無恙時面兄當宣兄懷米云僞伯思云宰相安和帖乃郗愔書謂宰相者簡文作相王時也殷生者殷浩也然此或是書郗愔帖語耳而結字實近世人僞作愔書自與逸少早年抗衡而此帖了無晉韻其非審矣泉本兄懷弔行倒在恙時行前噉豆一作宣非鼠傷如佳今送能噉不闕得足下旃􅄢胡桃藥二種知足下至戎塩乃要也是前藥字此是字十七帖小注在旁閣本皆摹入行中服食所須知足下得施作謂須施作頃服食方回郗愔字近之按書法當作去字未許吾此志知我者希此有成言無縁見卿以當一笑秋中感懷異雨冷足下各可可耳胛劉作脾陳云當作胛常案胛古狎切背胛也又見第七卷太帖第十卷首帖皆作胛庭堅云此後有髀中故不差八卷有痺差不十卷有聚在左髀又有婢日夕字又有靜婢字視髀痺婢筆法可知非脾字也風遂欲成患甚憂之力知問王羲之頓首泉本此帖斜裂二行米闕云已上三帖真闕闕痛熙存施釋注云劉作孝陳去非云與虞世南帖中學字筆法相似而闕不同故知皆未必是也故作存下乃亡字闕書譜云謂必存錄存字草法與此闕書斷庭有云過庭草憲章二王故此字闕按陳謂虞帖中學字筆闕矣虞帖字義亦通矣頭上有交乂轉筆闕說爲不同當以施是亡政爾復何於求之度政當求之内事餘理不絶求之一條當有冀不信罔泉本此石斷二行然前塗願乙乙陳施俱作具誨之以悟其心二政字當作正蓋逸少祖名正故王氏作書正月或作初月一月及他正字皆以政代之也疾不退潛損亦當日深豈可以常理待之此豈常此豈常下各有一㸃憂不審食復何如云飢色可可所堪轉勝復以此慰馳竦劉作疎施陳作竦耳米云已上二帖僞按後一帖語重十卷但損亦二字合作處字又少一云字張云帖内字下各有一㸃當是重此一句吾有七兒一女皆同生㛰娶以陳云逸少父子通用以爲已字詳此後一段心以馳於彼矣可見畢唯一小者尚未㛰耳過此一㛰便得至彼今内外孫有十六人足慰目前足下情至委曲故具示省足下别疏具彼土山川諸奇楊雄蜀都左太沖三都殊爲不備悉彼故爲多奇益令其遊目意足闕告卿求進施作迎張作近少人足耳至時示意闕以日爲歳想足下鎮彼土未有動理耳闕在彼登汶領峩眉而旋實不朽之盛闕以馳於彼矣云譙周有孫高尚不出今大觀并十七帖此下有爲所在其人有以副此志十字凡淳化本俱闕此行不令人依依足下具示嚴君平司馬相如楊子雲皆有後不米云已上三帖真按大觀嚴君平另作一帖修内司十七帖亦然夫人遂善平康也足下各可不冀行復面王羲之頓首伯思云夫人及蔡家二帖亦後人依放想小大悉佳蔡家賓至君情感益深唯當撥遣之耳米云已上二帖僞知足下散勢小差此慰無以爲喻云氣力故爾復以胡當作悒怛想散患得差餘當以漸消息耳吾頃無一日佳衰老之弊日至夏不得有所噉而猶有勞務甚劣劣昨得熙二十六日書云患氣懸情米云已上三帖真知足下連不快何爾耿耿善將適吾積羸困而下闕斷情慮尚深殊乏自力不能悉米云此帖闕智永書更致問一一適修載書平安米云此帖僞羲之白奉告慰反側㐲想比安和伯熊過見之悲闕猶云大凡也高適詩闕都秋雁少即此意可耳惟垂心羲之平平音便王道平平均也一日白比施作以具羲之白大觀已上三字連上帖已下另作一帖送此鯉魚征與敬淳化闕波二王帖波全耶不在不乃邑邑不伯思云鯉魚帖敬字後行成帖殷字皆闕波語在第五卷施云褚河南禁中西堂行書目載此自係一帖南唐刻石本坐行成前帖之後淳化大觀本另作一帖月半哀悼一作忤兼至柰何柰何得告承復下懸耿劉作能非王導帖中耿字亦如此法至勿勿施陳同劉合作具願一作凡不具王羲之再拜米云已上二帖真今遣郷里人往口言當作具也大觀此行另作一帖淳化連下行成帖行成旅以伯思作比從是月也景風司至星火殷施陳作列庭堅亦誤作列者以慶厯帖闕波故也宵伯趙鵙也伯勞也鳴而載唐文粹作戒陰爽鳩鷹也習庭堅作集而揚武時文粹作賦字可以升高逺望禮可以出宿餞行有詔具寮爰開祖米云僞帖伯思云賈曽送張說赴朔方序中云備官而行成旅比從是云云有詔具僚爰開祖宴且申後命寵以蕃錫此本有此文自行字上祖字下皆亡之而作草闕當是集逸少書寫此叔耳先輩以爲張闕下賈至文非也米亦以自是月下爲僞殊不知自行成已僞蓋此帖失其首尾而米未嘗考賈曽文闕報近得書即日又得永興蕭山縣舊名諸本興字糢糊書甚慰想在道可耳吾疾故爾沉滯憂悴解日面近不具施作乙乙羲之報四月二十三日羲之頓首昨書不悉君可不腫劇憂之力遣不具施作乙乙羲之頓首濶别稍久眷與時長寒嚴足下何如想清豫耳披懷之暇復何致樂諸劉作往陳施作諸又云鈎勒時筆法有誤處故後人疑爲往字如此下諸無意作諸字曉然矣賢從就理當不疎吾之朽疾日就羸頓加復風勞諸無意賴促膝未近東望慨然所冀日月易得還期非逺耳深敬冝音問在數遇信悤遽萬不一陳伯思云濶别稍久眷與時長帖末云遇信悤遽萬不一陳字既甚惡而筆語乃爾非逸少書無疑吾昨得一日一起帖米以爲張長史書有之但米論多以草字差大者爲非二王書一槩求之理恐未竟旦極寒得示承夫人復小欬不善得眠助反側想小爾復進何藥念足下猶悚息卿可不吾昨暮復闕便爾旦來可耳知足下念王羲之頓首卿闕黄諌作之虞休意書有所問足下㫖爲致誠答令闕忘此意自決令以資嚴知小大疾患念勞心四月五日羲之報建安靈柩至慈蔭幽絶垂三十年永惟寶晉帖有崩字慕痛徹五内永酷柰何無由言若張作告劉作昔一作發皆非臨紙摧哽羲之報張作批米云已上六帖真吾昨得一日一起腹中極調適無所爲憂但顧一作願一作欣字情不可言耳米以爲張旭書侍中書書徐侯遂危篤恐無復冀深令人反側敬豫敬豫王恬字也劉作潒陳作像施作豫卷案書法豫傍予字作二卷王珉第四帖卿可豫六闊别帖想清豫及此敬豫帖七卷長素帖得敬豫俱如此法當以不疑乃成委頓令人深憂適知劉釋闕施作知十五日問清和爲慰復得南後問不想二庾陳作庚一作康速一作建非王一作至之始興奴長就令人邑邑想無所至黄諫作主耳還具示問米云已上二帖真追尋傷悼但有痛心當柰何柰何得告慰之吾昨闕欲不自勝舉旦復服散行之益頓乏推理闕所誨然吾老矣餘願未盡惟在子輩耳闕垂盡之年將無復理此當何益冀小闕耳省卿書但有酸劉施作毁塞足下念顧言散所割多也王羲之頓首米云子敬代父書伯思云追尋帖米以爲大令書非也字勢圓𦂳既非獻之體而中云吾老矣餘願未盡惟在子輩耳案大令壽四十三初無後嗣與此帖不合又法書要錄逸少帖内有此語固宜在此卷不得臨川一作小問懸心不可言子嵩之子來數有使冀因得問示之伯思云不得臨川問帖亦非逸少書庾子嵩非同時人也得袁二謝書具施作乙乙爲慰袁生蹔至都已還未案閣本書法未字不出頭當是樂字此生至到之懷吾疑作無所也想小大皆佳知賓猶爾耿耿想得夏節佳也念君勞心賢姉大都轉差然故有時嘔食不已此字疑至足言年衰疾久亦非可倉卒大都轉差爲慰以大近不復一合作覆非服散常將陟厘藥名即苔也又可作紙南人誤呼爲側理也此藥爲益如君告適太常司州領劉作鎮施作領軍諸人廿五六書皆佳司州以爲平復此慶慶可言餘親親皆佳大奴以一作闕冀或見之司闕司州供右潘本有第六卷闕二享奇七小字俱半行給寥落去無期也闕私之望無理或復是福得大等書慰心也野數言疏平安定太宰中郎近因得一作鄉里人書想至知故面腫耿耿今差不吾比日食意如差而骭劉陳作髀步米切股也施張作骭遐諌切脛也中故不差以此爲至患至不可勞力數字令弟知問耳米云已上六帖皆真疾患差也念憂勞王羲之頓首米云僞想弟必有遇理得蹔寫懷若此不果役劉作復施陳作役一作後此後第四段一役字體正同期欲難冀臨書多歎吾不復堪事比當作似成此書便大頓米云真二十日羲之頓首節日感歎深念君増傷灾雨一作兩君可也伯思云廿日羲之下二帖結體雖疎詞筆皆有王氏風氣殆是唐人縱筆臨倣非摹榻也僕米作餘一作深皆非可耳力數字王羲之頓首定聽米作登非他母子哀此遂不還可令未也米云已上三帖僞適闕書如此果爾乃甚可憂張平不立勢向河南闕諸侯何以當之熙表故未出不說說荀侯闕當轉佳耳若熙自一作得亦通陳作目非勉此一役闕言淺見實不見今時兵任可處理案重熙郗鑒子曇字也羲之妻鑒女重熙之姉也郗曇傳時北中郎荀羡有疾朝廷以曇爲羡軍司羡征還除曇北中郎將都督徐兖青幽揚州之晉陵諸軍事鎮下邳此云荀侯蓋指羡也二謝在此近有飛白終日不同同施作同同劉誤作同之此歎恨不得方回郗愔字知春施作幸幸後問令人怛怛米云已上二帖真重熙帖内今當作令字法帖釋文考異卷六
